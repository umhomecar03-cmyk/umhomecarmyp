// ============================================================
// GLOBAL SEARCH — ค้นหาเคสข้ามหน้า (ยกเว้นหน้าตลาด)
// ============================================================
function GlobalSearch({currentUser,onClose,onNavigate}){
  const [q,setQ]=useState('');
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const inputRef=useRef();
  useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),80);},[]);
  useEffect(()=>{
    if(q.trim().length<2){setResults([]);return;}
    setLoading(true);
    const t=setTimeout(async()=>{
      const [cr,ccr]=await Promise.all([
        api('searchCases',{q:q.trim()}),
        api('getClaimedCases',{sales:currentUser.name})
      ]);
      const myCases=(cr.success?(cr.data||[]):[]).filter(c=>c.sales===currentUser.name).map(c=>({...c,_type:'cases'}));
      const claimed=(ccr.success?(ccr.data||[]):[]).filter(c=>{
        const lq=q.toLowerCase();
        return String(c.caseID||'').toLowerCase().includes(lq)||String(c.customername||'').toLowerCase().includes(lq)||String(formatContact(c.contact)||'').includes(lq);
      }).map(c=>({...c,caseid:c.caseID,status:c.newstatus||c.status,_type:'claimed'}));
      // dedupe by caseid
      const seen=new Set();
      const merged=[...myCases,...claimed].filter(c=>{if(seen.has(c.caseid))return false;seen.add(c.caseid);return true;});
      setResults(merged);setLoading(false);
    },380);
    return ()=>clearTimeout(t);
  },[q,currentUser.name]);

  return <div className="overlay" style={{alignItems:'flex-start',paddingTop:56,zIndex:200}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:14,width:'100%',maxWidth:540,boxShadow:'0 20px 60px rgba(0,0,0,.55)',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
        <Ico.gsearch/>
        <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)}
          placeholder="ค้นหาชื่อลูกค้า เบอร์ หรือรหัสเคส..."
          style={{flex:1,background:'none',border:'none',outline:'none',fontSize:15,color:'var(--text)'}}
        />
        <button className="btn btn-ghost" style={{padding:'4px 8px'}} onClick={onClose}><Ico.x/></button>
      </div>
      <div style={{maxHeight:420,overflowY:'auto'}}>
        {loading?<div style={{padding:28,textAlign:'center',color:'var(--text2)'}}><span className="spin" style={{display:'inline-block',width:18,height:18}}/></div>
        :q.length<2?<div style={{padding:'22px 20px',textAlign:'center',color:'var(--text3)',fontSize:13}}>🔍 พิมพ์อย่างน้อย 2 ตัวอักษร</div>
        :results.length===0?<div style={{padding:'28px',textAlign:'center',color:'var(--text2)'}}>
          <div style={{fontSize:32,marginBottom:8}}>🤷</div>
          <div style={{fontSize:14}}>ไม่พบผลลัพธ์สำหรับ "{q}"</div>
        </div>
        :<>{<div style={{padding:'8px 16px 0',fontSize:11,color:'var(--text3)'}}>พบ {results.length} รายการ</div>}
        {results.map((c,i)=><div key={i} className="gs-result"
          onClick={()=>{onNavigate(c._type);onClose();}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <span style={{color:'var(--blue)',fontWeight:700,fontSize:13}}>{c.caseid}</span>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <span style={{fontSize:11,background:c._type==='claimed'?'rgba(188,140,255,.15)':'rgba(88,166,255,.1)',color:c._type==='claimed'?'var(--purple)':'var(--blue)',padding:'2px 8px',borderRadius:20}}>
                {c._type==='claimed'?'📥 รับจากตลาด':'📋 เคสของฉัน'}
              </span>
              <StatusBadge status={c.status}/>
            </div>
          </div>
          <div style={{fontWeight:600,fontSize:14}}>{c.customername||c.name||'-'}</div>
          <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{displayContact(c.contact)||'-'}</div>
        </div>)}
        </>}
      </div>
    </div>
  </div>;
}

// ============================================================
// DAILY FOCUS PAGE — วันนี้ฉันต้องทำอะไร
// ============================================================
function DailyFocusPage({currentUser,onNavigate}){
  const [myCases,setMyCases]=useState([]);
  const [claimedCases,setClaimedCases]=useState([]);
  const [marketCount,setMarketCount]=useState(0);
  const [loading,setLoading]=useState(true);
  const now=Date.now();

  const load=useCallback(()=>{
    setLoading(true);
    Promise.all([
      api('getCases',{sales:currentUser.name,all:'true'}),
      api('getClaimedCases',{sales:currentUser.name}),
      api('getMarket',{sales:currentUser.name})
    ]).then(([cr,ccr,mr])=>{
      if(cr.success) setMyCases(cr.data||[]);
      if(ccr.success) setClaimedCases(ccr.data||[]);
      if(mr.success) setMarketCount((mr.data||[]).filter(c=>c.old_sales!==currentUser.name).length);
      setLoading(false);
    });
  },[currentUser.name]);
  useEffect(()=>{load();},[load]);

  const CLOSED=['ปิดเคส','รีเจค','ปล่อยแล้ว','ได้รถจากที่อื่น','โยนเคส'];
  function parseDate(d){const s=String(d||'');const m=s.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);if(!m)return null;return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]),parseInt(m[4]),parseInt(m[5]));}
  function hoursAgo(d){const dt=parseDate(d);if(!dt)return 0;return(now-dt.getTime())/3600000;}
  function hText(h){if(h<1)return'เมื่อกี้';if(h<24)return`${Math.floor(h)} ชม.ที่แล้ว`;return`${Math.floor(h/24)} วันที่แล้ว`;}

  const active=myCases.filter(c=>!CLOSED.includes(c.status));
  const autoSendSoon=active.filter(c=>hoursAgo(c.updatedat)>=60);
  const critical=active.filter(c=>hoursAgo(c.updatedat)>=48&&hoursAgo(c.updatedat)<60);
  const warn=active.filter(c=>hoursAgo(c.updatedat)>=12&&hoursAgo(c.updatedat)<48);
  const hotStatuses=['ไปต่อได้','จอง','รอเซ็นต์','รอผล','อนุมัติ'];
  const hot=active.filter(c=>hotStatuses.includes(c.status));

  const h=new Date().getHours();
  const greeting=h<12?'🌅 อรุณสวัสดิ์':h<17?'☀️ สวัสดีตอนบ่าย':'🌆 สวัสดีตอนเย็น';
  const allClear=autoSendSoon.length===0&&critical.length===0&&warn.length===0;

  const FocusBlock=({color,borderColor,bg,title,items,extra=null})=><div className="focus-block" style={{background:bg,border:`1px solid ${borderColor}`}}>
    <div style={{fontWeight:700,color,marginBottom:8,fontSize:13,display:'flex',alignItems:'center',gap:6}}>{title}</div>
    {items.slice(0,5).map((c,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 8px',borderRadius:7,background:`rgba(255,255,255,.03)`,marginBottom:i<items.length-1?4:0}}>
      <div style={{display:'flex',alignItems:'center',gap:6,minWidth:0,flex:1}}>
        <span style={{color:'var(--blue)',fontWeight:700,fontSize:12,flexShrink:0}}>{c.caseid}</span>
        <span style={{fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.customername}</span>
        <StatusBadge status={c.status}/>
      </div>
      <span style={{fontSize:11,color,flexShrink:0,marginLeft:8}}>{hText(hoursAgo(c.updatedat))}</span>
    </div>)}
    {items.length>5&&<div style={{fontSize:11,color:'var(--text3)',textAlign:'center',marginTop:4}}>+{items.length-5} รายการ</div>}
    {extra}
  </div>;

  return <div className="page">
    {/* Greeting card */}
    <div style={{background:'linear-gradient(135deg,#1a2a4a 0%,#0f2233 100%)',border:'1px solid rgba(88,166,255,.2)',borderRadius:14,padding:'20px 22px',marginBottom:18}}>
      <div style={{fontSize:12,color:'var(--blue)',marginBottom:3,letterSpacing:.5}}>{greeting}</div>
      <div style={{fontSize:20,fontWeight:800,marginBottom:6}}>{currentUser.name} 👋</div>
      <div style={{fontSize:12,color:'var(--text2)'}}>
        {new Date().toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
      </div>
    </div>

    {/* Quick stats */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
      {[['📋 เคส Active',active.length,'var(--blue)','cases'],['🏪 ตลาดว่าง',marketCount,'var(--green)','market'],['📥 รับแล้ว',claimedCases.length,'var(--purple)','claimed']].map(([l,v,c,key])=>
        <div key={key} onClick={()=>onNavigate(key)} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 8px',textAlign:'center',cursor:'pointer',transition:'border-color .15s'}}
          onMouseOver={e=>e.currentTarget.style.borderColor=c} onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}>
          <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>{l}</div>
          <div style={{fontSize:22,fontWeight:800,color:c}}>{loading?'—':v}</div>
        </div>
      )}
    </div>

    {loading?<Loading/>:
    <>
      {/* 🚨 ใกล้ถูกส่งตลาดอัตโนมัติ */}
      {autoSendSoon.length>0&&<FocusBlock
        color="var(--red)" borderColor="rgba(248,81,73,.45)" bg="rgba(248,81,73,.07)"
        title={`🚨 ใกล้ถูกส่งตลาดอัตโนมัติ (${autoSendSoon.length}) — ไม่อัปเดต >60 ชม.`}
        items={autoSendSoon}
        extra={<div style={{fontSize:12,color:'rgba(248,81,73,.8)',marginTop:6}}>⚡ รีบอัปเดตก่อนเคสถูกส่งตลาดใน 72 ชม.</div>}
      />}

      {/* ⚠️ ค้างนาน 48 ชม. */}
      {critical.length>0&&<FocusBlock
        color="var(--yellow)" borderColor="rgba(210,153,34,.4)" bg="rgba(210,153,34,.07)"
        title={`⚠️ ค้างนาน — ควร follow up ด่วน (${critical.length})`}
        items={critical}
      />}

      {/* ⏰ 12-48 ชม. */}
      {warn.length>0&&<FocusBlock
        color="var(--blue)" borderColor="rgba(88,166,255,.25)" bg="rgba(88,166,255,.05)"
        title={`⏰ ควร follow up วันนี้ (${warn.length})`}
        items={warn}
      />}

      {/* 🎯 โอกาสปิด */}
      {hot.length>0&&<FocusBlock
        color="var(--green)" borderColor="rgba(63,185,80,.25)" bg="rgba(63,185,80,.05)"
        title={`🎯 สถานะดี — โอกาสปิดการขาย (${hot.length})`}
        items={hot}
      />}

      {/* All clear */}
      {allClear&&hot.length===0&&<div style={{textAlign:'center',padding:'36px 0',color:'var(--green)'}}>
        <div style={{fontSize:52,marginBottom:12}}>✅</div>
        <div style={{fontWeight:800,fontSize:17}}>ทุกอย่างอัปเดตแล้ว!</div>
        <div style={{fontSize:13,color:'var(--text2)',marginTop:6}}>คุณกำลังทำได้ยอดเยี่ยมมาก 🎉</div>
      </div>}

      {/* Market prompt */}
      {marketCount>0&&<div onClick={()=>onNavigate('market')} style={{background:'rgba(188,140,255,.08)',border:'1px solid rgba(188,140,255,.3)',borderRadius:10,padding:'14px 16px',cursor:'pointer',transition:'all .15s',display:'flex',alignItems:'center',gap:12}}
        onMouseOver={e=>e.currentTarget.style.borderColor='var(--purple)'} onMouseOut={e=>e.currentTarget.style.borderColor='rgba(188,140,255,.3)'}>
        <div style={{fontSize:28}}>🏪</div>
        <div><div style={{fontWeight:700,color:'var(--purple)',fontSize:14}}>ตลาดมีเคสว่าง {marketCount} ใบ</div>
        <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>กดเพื่อไปหน้าตลาด →</div></div>
      </div>}
    </>}
    <button className="btn btn-ghost" style={{marginTop:14,width:'100%',fontSize:13}} onClick={load}>🔄 รีเฟรช</button>
  </div>;
}

// ============================================================
// PUSH NOTIFICATION — ขอ permission + polling ใน React
// ============================================================
// Hook: เริ่ม push polling หลังได้ permission
function usePushNotif(apiUrl, salesName){
  const seenRef=useRef(new Set());

  useEffect(()=>{
    if(!salesName||!apiUrl) return;
    var notifPerm='';
    try{ notifPerm=(typeof Notification!=='undefined')?Notification.permission:''; }catch(e){ return; }
    try{const s=JSON.parse(localStorage.getItem('cp_seen_notifs')||'[]');seenRef.current=new Set(s);}catch(e){}

    function poll(){
      var perm='';
      try{perm=(typeof Notification!=='undefined')?Notification.permission:'';}catch(e){return;}
      if(perm!=='granted') return;
      fetch(apiUrl+'?action=getNotifications&sales='+encodeURIComponent(salesName),{method:'GET',mode:'cors'})
        .then(function(r){return r.json();})
        .then(function(j){
          var fresh=(j.data||[]).filter(function(n){return n['สถานะ']==='unread'&&!seenRef.current.has(n.notifId);});
          if(fresh.length>0){
            fresh.forEach(function(n){seenRef.current.add(n.notifId);});
            try{localStorage.setItem('cp_seen_notifs',JSON.stringify([...seenRef.current]));}catch(e){}
            var body=fresh.length===1?fresh[0].message:fresh.length+' การแจ้งเตือนใหม่';
            try{new Notification('🚗 CasePool',{body:body,icon:'https://raw.githubusercontent.com/umhomecar03-cmyk/umhomecar/main/do.png',tag:'casepool',renotify:true});}catch(e){}
          }
        }).catch(function(){});
    }

    // ลงทะเบียน global trigger — ให้ส่วนอื่นเรียก poll ได้ทันที
    window.cpTriggerPushPoll = function(delayMs){
      setTimeout(poll, delayMs||1500); // หน่วงเล็กน้อยให้ backend บันทึก notif ก่อน
    };

    // poll ทุก 2 นาที
    var t=setInterval(poll,120000);
    return function(){ clearInterval(t); window.cpTriggerPushPoll=null; };
  },[apiUrl,salesName]);
}

function PushNotifBanner({currentUser}){
  const supported=(function(){try{return typeof Notification!=='undefined';}catch(e){return false;}})();
  const [perm,setPerm]=useState(function(){try{return supported?Notification.permission:'unsupported';}catch(e){return 'unsupported';}});
  const [installable,setInstallable]=useState(!!window._deferredInstall);
  const [dismissed,setDismissed]=useState(()=>{try{return !!localStorage.getItem('cp_pn_dismissed');}catch(e){return false;}});
  const [asking,setAsking]=useState(false);

  useEffect(()=>{
    const h=()=>setInstallable(true);
    window.addEventListener('pwa-installable',h);
    return ()=>window.removeEventListener('pwa-installable',h);
  },[]);

  if(!supported||perm==='granted'||perm==='denied'||dismissed) return null;

  async function requestPerm(){
    setAsking(true);
    const p=await Notification.requestPermission();
    setPerm(p);
    setAsking(false);
    if(p==='granted'){
      new Notification('🚗 CasePool',{body:'เปิดการแจ้งเตือนสำเร็จแล้ว!',icon:'https://raw.githubusercontent.com/umhomecar03-cmyk/umhomecar/main/do.png'});
    }
  }
  async function installPWA(){
    if(!window._deferredInstall) return;
    window._deferredInstall.prompt();
    const{outcome}=await window._deferredInstall.userChoice;
    if(outcome==='accepted'){window._deferredInstall=null;setInstallable(false);}
  }
  function dismiss(){setDismissed(true);try{localStorage.setItem('cp_pn_dismissed','1');}catch(e){}}

  return <div className="pn-banner" style={{marginBottom:14}}>
    <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
      <div style={{fontSize:26,flexShrink:0}}>🔔</div>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,fontSize:13,marginBottom:3}}>เปิดรับการแจ้งเตือนบนมือถือ</div>
        <div style={{fontSize:12,color:'var(--text2)',marginBottom:10,lineHeight:1.6}}>
          รับ push notification โดยตรงบนมือถือ ไม่พลาดทุกการแจ้งเตือน
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-primary" style={{fontSize:12,padding:'6px 16px'}} onClick={requestPerm} disabled={asking}>
            {asking?'กำลังขอ...':'เปิดการแจ้งเตือน'}
          </button>
          {installable&&<button className="btn btn-ghost" style={{fontSize:12,padding:'6px 12px',color:'var(--purple)',border:'1px solid rgba(188,140,255,.4)'}} onClick={installPWA}>
            📲 ติดตั้งแอป
          </button>}
          <button className="btn btn-ghost" style={{fontSize:12,padding:'6px 10px'}} onClick={dismiss}>ภายหลัง</button>
        </div>
      </div>
    </div>
  </div>;
}

// ============================================================
// AI ADVISOR PAGE — วิเคราะห์เคส + แนะนำ AI
// ============================================================
function AIAdvisorPage({currentUser}){
  const [cases,setCases]=useState([]);
  const [claimedCases,setClaimedCases]=useState([]);
  const [loading,setLoading]=useState(true);
  const [aiText,setAiText]=useState('');
  const [aiLoading,setAiLoading]=useState(false);
  const [aiDone,setAiDone]=useState(false);
  const [tab,setTab]=useState('recommend'); // 'recommend'|'winrate'|'script'
  const [scriptCase,setScriptCase]=useState('');
  const abortRef=useRef(null);

  const CLOSED=['ปิดเคส','รีเจค','ปล่อยแล้ว','ได้รถจากที่อื่น','โยนเคส'];

  const load=useCallback(()=>{
    setLoading(true);
    Promise.all([
      api('getCases',{sales:currentUser.name,all:'true'}),
      api('getClaimedCases',{sales:currentUser.name})
    ]).then(([cr,ccr])=>{
      if(cr.success) setCases((cr.data||[]).filter(c=>!CLOSED.includes(c.status)));
      if(ccr.success) setClaimedCases(ccr.data||[]);
      setLoading(false);
    });
  },[currentUser.name]);
  useEffect(()=>{load();},[load]);

  function parseDate(d){const s=String(d||'');const m=s.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);if(!m)return null;return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]),parseInt(m[4]),parseInt(m[5]));}
  function hoursAgo(d){const dt=parseDate(d);if(!dt)return 0;return(Date.now()-dt.getTime())/3600000;}
  function daysAgo(d){return Math.floor(hoursAgo(d)/24);}

  // เตรียม case summary สำหรับส่งให้ AI
  function buildCaseSummary(){
    const allActive=[
      ...cases.map(c=>({id:c.caseid,name:c.customername,status:c.status,report:(c.report||'').slice(0,120),daysNoUpdate:daysAgo(c.updatedat),source:'เคสของฉัน'})),
      ...claimedCases.map(c=>({id:c.caseID,name:c.customername,status:c.newstatus||c.status,report:(c.report||'').slice(0,120),daysNoUpdate:daysAgo(c.date),source:'รับจากตลาด'}))
    ];
    return allActive;
  }

  async function askAI(promptType){
    if(!API_URL){setAiText('❌ ต้องตั้งค่า API_URL ก่อนใช้งาน AI');setAiDone(true);return;}
    const summary=buildCaseSummary();
    if(summary.length===0){setAiText('❌ ไม่มีเคสที่ active อยู่ตอนนี้');setAiDone(true);return;}

    setAiLoading(true);setAiText('');setAiDone(false);
    if(abortRef.current) abortRef.current.abort();
    const ctrl=new AbortController();abortRef.current=ctrl;

    let systemPrompt='คุณคือที่ปรึกษาเซลส์รถยนต์มืออาชีพ วิเคราะห์ข้อมูลเคสและให้คำแนะนำเป็นภาษาไทย กระชับ ตรงประเด็น ใช้ emoji ประกอบ';
    let userPrompt='';

    if(promptType==='recommend'){
      userPrompt=`เซลส์ชื่อ "${currentUser.name}" มีเคสดังนี้:\n\n`
        +summary.map((c,i)=>`${i+1}. [${c.id}] ${c.name} | สถานะ: ${c.status} | ไม่อัปเดต: ${c.daysNoUpdate} วัน | ${c.source}\n   รีพอร์ต: ${c.report||'ไม่มี'}`).join('\n\n')
        +`\n\nวิเคราะห์และแนะนำ:\n1. 🎯 ลำดับ TOP 5 เคสที่ควรปิดก่อน (พร้อมเหตุผล)\n2. ⚠️ เคสที่ต้องระวัง/เร่งดำเนินการ\n3. 💡 คำแนะนำเฉพาะสำหรับแต่ละเคส TOP 5`;
    } else if(promptType==='winrate'){
      userPrompt=`วิเคราะห์อัตราการปิดเคสของเซลส์ "${currentUser.name}":\n\n`
        +summary.map((c,i)=>`${i+1}. [${c.id}] ${c.name} | สถานะ: ${c.status} | ไม่อัปเดต: ${c.daysNoUpdate} วัน\n   รีพอร์ต: ${c.report||'ไม่มี'}`).join('\n\n')
        +`\n\nประเมิน Win Rate ของแต่ละเคสเป็น % (0-100%) พร้อมเหตุผลสั้นๆ จัดเรียงจากโอกาสสูงสุดไปต่ำสุด แสดงเป็นตาราง emoji`;
    } else if(promptType==='script'){
      const c=cases.find(x=>x.caseid===scriptCase)||claimedCases.find(x=>x.caseID===scriptCase);
      if(!c){setAiText('❌ ไม่พบเคสนี้');setAiLoading(false);setAiDone(true);return;}
      const cn=c.customername||c.name;const st=c.status||c.newstatus;const rp=c.report||'ไม่มี';
      userPrompt=`สร้าง Script โทรหาลูกค้าสำหรับเคสนี้:\nชื่อลูกค้า: ${cn}\nสถานะ: ${st}\nรีพอร์ต: ${rp}\n\nสร้าง Script การสนทนาที่เป็นธรรมชาติ ภาษาไทย เหมาะกับการโทรหาลูกค้ารถยนต์ มีทั้ง opening, body, closing และ objection handling`;
    }

    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',signal:ctrl.signal,
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:1200,stream:true,
          system:systemPrompt,
          messages:[{role:'user',content:userPrompt}]
        })
      });
      const reader=res.body.getReader();const dec=new TextDecoder();
      while(true){
        const{done,value}=await reader.read();if(done)break;
        const chunk=dec.decode(value);
        const lines=chunk.split('\n');
        for(const line of lines){
          if(!line.startsWith('data:'))continue;
          const d=line.slice(5).trim();if(d==='[DONE]')continue;
          try{
            const j=JSON.parse(d);
            if(j.type==='content_block_delta'&&j.delta?.text){
              setAiText(t=>t+j.delta.text);
            }
          }catch(e){}
        }
      }
      setAiDone(true);
    }catch(err){
      if(err.name!=='AbortError'){setAiText(t=>t+(t?'\n\n':'')+'❌ เกิดข้อผิดพลาด: '+err.message);}
      setAiDone(true);
    }
    setAiLoading(false);
  }

  const activeCases=[...cases,...claimedCases.map(c=>({...c,caseid:c.caseID,customername:c.customername}))];

  return <div className="page">
    <div className="page-hd">
      <div>
        <div className="page-title">🧠 AI แนะนำ</div>
        <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>วิเคราะห์เคสด้วย AI Claude</div>
      </div>
      <button className="btn btn-ghost" style={{fontSize:13}} onClick={load}>🔄</button>
    </div>

    {/* Tabs */}
    <div style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
      {[['recommend','🎯 แนะนำลำดับ'],['winrate','📊 Win Rate'],['script','📞 Script โทร']].map(([k,l])=>
        <button key={k} onClick={()=>{setTab(k);setAiText('');setAiDone(false);}}
          style={{padding:'7px 14px',borderRadius:20,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,whiteSpace:'nowrap',
            background:tab===k?'var(--blue2)':'var(--bg3)',color:tab===k?'#fff':'var(--text2)',transition:'all .15s'}}>
          {l}
        </button>
      )}
    </div>

    {/* Script case selector */}
    {tab==='script'&&<div className="card" style={{marginBottom:14}}>
      <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>เลือกเคสที่ต้องการ Script</div>
      {loading?<Loading/>:<select value={scriptCase} onChange={e=>setScriptCase(e.target.value)} style={{marginBottom:0}}>
        <option value="">-- เลือกเคส --</option>
        {activeCases.map(c=><option key={c.caseid} value={c.caseid}>[{c.caseid}] {c.customername}</option>)}
      </select>}
    </div>}

    {/* Summary */}
    {!loading&&tab!=='script'&&<div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      {[['เคสที่วิเคราะห์',buildCaseSummary().length,'var(--blue)'],['Active',cases.length,'var(--green)'],['รับตลาด',claimedCases.length,'var(--purple)']].map(([l,v,c])=>
        <div key={l} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 14px',flex:1,minWidth:80,textAlign:'center'}}>
          <div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div>
          <div style={{fontSize:11,color:'var(--text2)'}}>{l}</div>
        </div>
      )}
    </div>}

    {/* Ask AI button */}
    {!aiLoading&&(!aiText||aiDone)&&<button
      className="btn btn-primary"
      style={{width:'100%',padding:'13px',fontSize:15,fontWeight:700,borderRadius:10,
        background:'linear-gradient(135deg,#1f6feb,#8250df)',marginBottom:16,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}
      disabled={loading||(tab==='script'&&!scriptCase)}
      onClick={()=>askAI(tab)}>
      <span style={{fontSize:20}}>🧠</span>
      {tab==='recommend'?'วิเคราะห์เคสทั้งหมด':tab==='winrate'?'ประเมิน Win Rate':'สร้าง Script โทร'}
    </button>}

    {/* Streaming output */}
    {(aiText||aiLoading)&&<div className="card" style={{marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontWeight:700,fontSize:13,color:'var(--purple)',display:'flex',alignItems:'center',gap:6}}>
          🧠 {aiLoading?'AI กำลังวิเคราะห์...':'ผลวิเคราะห์'}
        </div>
        {aiLoading&&<button className="btn btn-ghost" style={{fontSize:12,padding:'3px 10px'}} onClick={()=>abortRef.current?.abort()}>หยุด</button>}
        {aiDone&&aiText&&<button className="btn btn-ghost" style={{fontSize:12,padding:'3px 10px'}} onClick={()=>{setAiText('');setAiDone(false);}}>ล้าง</button>}
      </div>
      <div className="ai-stream">{aiText}{aiLoading&&<span className="ai-cursor"/>}</div>
    </div>}

    {/* Tips */}
    {!aiText&&!aiLoading&&<div style={{background:'var(--bg3)',borderRadius:10,padding:'16px',fontSize:13,color:'var(--text2)',lineHeight:1.8}}>
      <div style={{fontWeight:700,color:'var(--text)',marginBottom:6}}>AI ช่วยได้อะไรบ้าง?</div>
      🎯 <strong>แนะนำลำดับ</strong> — วิเคราะห์เคสทั้งหมดแล้วบอกว่าควรปิดอันไหนก่อน<br/>
      📊 <strong>Win Rate</strong> — ประเมินโอกาสปิดแต่ละเคสเป็น %<br/>
      📞 <strong>Script โทร</strong> — สร้างบทพูดโทรหาลูกค้าเฉพาะเคสนั้น
    </div>}
  </div>;
}

// SALES — MARKET (New Card Grid Design)
// ============================================================
function SalesMarket({currentUser}){
  const [cases,setCases]=useState([]);
  const [claimedCases,setClaimedCases]=useState([]);
  const [loading,setLoading]=useState(true);
  const [claimedIds,setClaimedIds]=useState(new Set()); // optimistic track
  const [skippedIds,setSkippedIds]=useState(new Set()); // optimistic track
  const [toast,setToast]=useState(null); // {msg, type:'ok'|'err'}
  const [leaderboard,setLeaderboard]=useState([]);

  const showToast=(msg,type='ok')=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3500);
  };

  const load=useCallback((silent=false)=>{
    if(!silent) setLoading(true);
    Promise.all([
      api('getMarket',{sales:currentUser.name}),
      api('getClaimedCases',{sales:currentUser.name}),
      api('getDashboard',{role:'Admin'})
    ]).then(([mr,cr,dr])=>{
      if(mr.success) setCases((mr.data||[]).filter(c=>c.old_sales!==currentUser.name));
      if(cr.success) setClaimedCases(cr.data||[]);
      if(dr.success) setLeaderboard(dr.data?.sales||[]);
      setLoading(false);
      // sync: clear optimistic sets after real data arrives
      setClaimedIds(new Set());
      setSkippedIds(new Set());
    });
  },[currentUser.name]);
  useEffect(()=>{load();},[load]);

  async function claim(caseId){
    // Optimistic: ซ่อนการ์ดทันที + แสดง toast ทันที
    setClaimedIds(prev=>new Set([...prev, caseId]));
    setClaimedCases(prev=>[...prev,{caseID:caseId,sale:currentUser.name}]);
    showToast('✅ รับเคส '+caseId+' สำเร็จ! ดูได้ที่ "รับจากตลาด"','ok');

    // sync API ข้างหลัง
    const r=await api('claimCase',{caseId,sales:currentUser.name});
    if(!r.success){
      // rollback ถ้า error
      setClaimedIds(prev=>{const s=new Set(prev);s.delete(caseId);return s;});
      setClaimedCases(prev=>prev.filter(c=>c.caseID!==caseId));
      showToast('❌ '+(r.error||'รับเคสไม่สำเร็จ ลองใหม่'),'err');
    } else {
      // silent reload เพื่อ sync ข้อมูลจริง (ไม่กระตุก)
      setTimeout(()=>load(true), 2000);
    }
  }

  async function notInterested(caseId){
    // Optimistic: ซ่อนการ์ดทันที
    setSkippedIds(prev=>new Set([...prev, caseId]));
    // sync API ข้างหลัง
    await api('returnCase',{caseId,sales:'_skip_'+currentUser.name});
    setTimeout(()=>load(true), 1000);
  }

  function getDateBadge(c){
    const id=String(c.ID||'');
    if(id.length>=4){
      const yy=id.slice(0,2),mm=id.slice(2,4);
      const year=2000+parseInt(yy);
      const monthNames=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
      const monthName=monthNames[parseInt(mm)-1]||mm;
      return `${monthName} ${year}`;
    }
    return '';
  }

  // กรองการ์ดที่ถูก claim/skip ออก (optimistic)
  const visibleCases=cases.filter(c=>!claimedIds.has(c.ID)&&!skippedIds.has(c.ID));
  const myStats=leaderboard.find(s=>s.name===currentUser.name)||{};
  const totalInMarket=visibleCases.length;
  const myClaimed=claimedCases.length+(claimedIds.size);
  const lbSorted=[...leaderboard].sort((a,b)=>(b.claimedCases||0)-(a.claimedCases||0));

  return <div className="mk-page">
    {/* Hero Header */}
    <div className="mk-hero">
      <div className="mk-hero-top">
        <div>
          <div style={{fontSize:20,fontWeight:800,display:'flex',alignItems:'center',gap:8}}>🎯 ตลาดเคส</div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>เลือกลูกค้าที่ใช่คนดูแล — ใครไวได้ก่อน</div>
        </div>
        <button className="btn btn-ghost" onClick={()=>load(false)} style={{fontSize:13}}>🔄</button>
      </div>
      <div className="mk-stats">
        {[
          ['ว่างอยู่',totalInMarket,'var(--blue)'],
          ['ของฉัน',myClaimed,'var(--green)'],
        ].map(([l,v,c])=>
          <div key={l} className="mk-stat"><div className="mk-stat-num" style={{color:c}}>{v}</div><div className="mk-stat-lbl">{l}</div></div>
        )}
      </div>
    </div>

    <div className="mk-body">
      {/* Cards Area */}
      <div className="mk-cards-area">
        {/* Toast notification */}
        {toast&&<div style={{
          background:toast.type==='ok'?'rgba(63,185,80,.12)':'rgba(248,81,73,.12)',
          border:`1px solid ${toast.type==='ok'?'var(--green)':'var(--red)'}`,
          padding:'10px 16px',borderRadius:8,marginBottom:14,fontSize:13,
          display:'flex',alignItems:'center',gap:8
        }}>
          {toast.msg}
        </div>}

        {loading?<SkeletonCards n={6}/>:visibleCases.length===0?
        <div style={{textAlign:'center',padding:60,color:'var(--text2)'}}>
          <div style={{fontSize:48,marginBottom:12}}>📭</div>
          <div style={{fontSize:16,fontWeight:600}}>ไม่มีเคสในตลาดสำหรับคุณ</div>
          <div style={{fontSize:13,marginTop:8}}>รอเคสใหม่เข้ามา หรือเช็คอีกครั้งในภายหลัง</div>
        </div>:
        <>
          <div style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>พบ {visibleCases.length} เคส ที่รอคนดูแล</div>
          <div className="mk-cards-grid">
            {visibleCases.map((c,i)=><div key={i} className="mkc">
              <div className="mkc-top">
                <span className="mkc-id">{c.ID}</span>
                <span className="mkc-date">📅 {getDateBadge(c)}</span>
              </div>
              <div className="mkc-name">{c.name}</div>
              <div className="mkc-badges">
                <StatusBadge status={c.status}/>
                <span className="badge" style={{background:'rgba(255,166,87,.1)',color:'var(--orange)',border:'1px solid rgba(255,166,87,.3)',fontSize:11}}>เคสจาก {c.old_sales||'-'}</span>
              </div>
              <div className="mkc-contact">
                📞 <span style={{filter:'blur(5px)',userSelect:'none',letterSpacing:1}}>••••••••••</span>
                <span style={{fontSize:11,color:'var(--text3)'}}>(เห็นหลังรับเคส)</span>
              </div>
              {c.report&&<div className="mkc-report">{String(c.report).slice(0,130)}{c.report.length>130?'...':''}</div>}
              <div className="mkc-actions">

              {i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}

            </div>
            <span style={{fontWeight:700,color:'var(--blue)',fontSize:14}}>{s.claimedCases||0}</span>
          </div>)}
        </div>
        <div className="mk-sb-section">
          <div className="mk-sb-title">📊 สถิติของฉัน</div>
          <div style={{display:'flex',flex:1,flexDirection:'column',gap:6}}>

      </div>
    </div>
  </div>;
}

// ============================================================
// SALES — CURRENT CASES
// ============================================================
function SalesCurrentCases({currentUser,users}){
  const [cases,setCases]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const [q,setQ]=useState('');
  const [sortDir,setSortDir]=useState('desc'); // desc=ใหม่ก่อน, asc=เก่าก่อน
  const [filterStatus,setFilterStatus]=useState('');
  const [showClosed,setShowClosed]=useState(false);

  const CLOSED_STATUSES=['ปิดเคส','รีเจค','ได้รถจากที่อื่น','โยนเคส','ปล่อยแล้ว'];

  const load=useCallback(()=>{
    setLoading(true);
    api('getCases',{sales:currentUser.name,all:'true'}).then(r=>{
      if(r.success) setCases(r.data||[]);
      setLoading(false);
    });
  },[currentUser.name]);
  useEffect(()=>{load();},[load]);

  // filter + sort
  const filtered = cases
    .filter(c=>{
      if(!showClosed && CLOSED_STATUSES.includes(c.status)) return false;
      if(filterStatus && c.status!==filterStatus) return false;
      if(q){
        const lq=q.toLowerCase();
        return String(c.caseid).includes(lq)||
               String(c.customername||'').toLowerCase().includes(lq)||
               String(c.contact||'').toLowerCase().includes(lq)||
               String(c.report||'').toLowerCase().includes(lq);
      }
      return true;
    })
    .sort((a,b)=>{
      const av=String(a.caseid||''), bv=String(b.caseid||'');
      return sortDir==='desc'?bv.localeCompare(av):av.localeCompare(bv);
    });

  const activeCount=cases.filter(c=>!CLOSED_STATUSES.includes(c.status)).length;
  const closedCount=cases.filter(c=>CLOSED_STATUSES.includes(c.status)).length;

  function formatDate(d){
    const s=String(d||'');
    // ISO format → แปลงเป็น dd/mm/yy HH:mm
    if(s.includes('T')){
      const dt=new Date(s);
      if(!isNaN(dt)){
        const dd=String(dt.getDate()).padStart(2,'0');
        const mm=String(dt.getMonth()+1).padStart(2,'0');
        const yy=String(dt.getFullYear()).slice(-2);
        const hh=String(dt.getHours()).padStart(2,'0');
        const min=String(dt.getMinutes()).padStart(2,'0');
        return `${dd}/${mm}/${yy} ${hh}:${min}`;
      }
    }
    // dd/MM/yyyy HH:mm:ss → เอาแค่ dd/mm/yy HH:mm
    const m=s.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);
    if(m) return `${m[1]}/${m[2]}/${String(m[3]).slice(-2)} ${m[4]}:${m[5]}`;
    return s.split(' ')[0]||'-';
  }

  return <div className="page">
    {/* Header */}
    <div className="page-hd" style={{marginBottom:12}}>
      <div>
        <div className="page-title">📋 เคสของฉัน</div>
        <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>
          กำลังดูแล <span style={{color:'var(--blue)',fontWeight:700}}>{activeCount}</span> เคส
          {closedCount>0&&<span style={{marginLeft:8,color:'var(--text3)'}}>· ปิดแล้ว {closedCount}</span>}
        </div>
      </div>
      <button className="btn btn-ghost" onClick={load} style={{padding:'6px 10px'}}>🔄</button>
    </div>

    {/* Search bar */}
    <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
      <div style={{position:'relative',flex:1,minWidth:180}}>
        <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--text3)',pointerEvents:'none',fontSize:14}}>🔍</span>
        <input
          value={q} onChange={e=>setQ(e.target.value)}
          placeholder="ค้นหาชื่อ เบอร์ รหัสเคส รีพอร์ต..."
          style={{paddingLeft:32,fontSize:13}}
        />
      </div>
      {q&&<button className="btn btn-ghost" style={{fontSize:12,padding:'6px 10px'}} onClick={()=>setQ('')}>✕ ล้าง</button>}
    </div>

    {/* Filter row */}
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
      {/* Sort toggle */}
      <button
        className="btn btn-ghost"
        style={{fontSize:12,padding:'6px 12px',display:'flex',alignItems:'center',gap:4,border:'1px solid var(--border)',borderRadius:20}}
        onClick={()=>setSortDir(d=>d==='desc'?'asc':'desc')}
      >
        {sortDir==='desc'?<>🆕 ใหม่สุดก่อน ↓</>:<>🕰 เก่าสุดก่อน ↑</>}
      </button>

      {/* Status filter */}
      <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}
        style={{fontSize:12,padding:'6px 10px',borderRadius:20,minWidth:120,flex:1,maxWidth:180}}>
        <option value="">ทุกสถานะ</option>
        {STATUSES.map(s=><option key={s}>{s}</option>)}
      </select>

      {/* Show closed toggle */}
      <button
        className="btn btn-ghost"
        style={{fontSize:12,padding:'6px 12px',borderRadius:20,
          border:`1px solid ${showClosed?'var(--red)':'var(--border)'}`,
          color:showClosed?'var(--red)':'var(--text2)'}}
        onClick={()=>setShowClosed(v=>!v)}
      >
        {showClosed?'🔴 ซ่อนปิดแล้ว':'⚫ แสดงเคสที่ปิด'}
      </button>

      {/* Result count */}
      <span style={{fontSize:12,color:'var(--text3)',marginLeft:'auto'}}>แสดง {filtered.length} รายการ</span>
    </div>

    {/* Case list */}
    {loading?<SkeletonCards n={4}/>:filtered.length===0?
      <div style={{textAlign:'center',padding:40,color:'var(--text2)'}}>
        <div style={{fontSize:32,marginBottom:8}}>🔍</div>
        <div>{q||filterStatus?'ไม่พบเคสที่ตรงกัน':'ยังไม่มีเคส'}</div>
      </div>:
      filtered.map((c,i)=><div key={i} className="market-card" onClick={()=>setSel(c)} style={{cursor:'pointer',opacity:CLOSED_STATUSES.includes(c.status)?0.6:1}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
          <span style={{color:'var(--blue)',fontWeight:700,fontSize:15}}>{c.caseid}</span>
          <StatusBadge status={c.status}/>
        </div>
        <div style={{fontWeight:600,marginBottom:4,fontSize:15}}>{c.customername}</div>
        <div style={{fontSize:12,color:'var(--text2)',marginBottom:6,display:'flex',alignItems:'center',gap:4,flexWrap:'wrap'}}>
          <span>📞 {displayContact(c.contact)}</span>
          <span style={{color:'var(--text3)'}}>·</span>
          <span>🕐 {formatDate(c.updatedat||c.createdat)}</span>
        </div>
        {c.report&&<div style={{fontSize:12,color:'var(--text2)',background:'var(--bg3)',padding:'6px 10px',borderRadius:6,marginTop:4,lineHeight:1.5}}>{String(c.report).slice(0,100)}{String(c.report).length>100?'...':''}</div>}
        <div style={{marginTop:10,display:'flex',gap:6}}>
          {!CLOSED_STATUSES.includes(c.status)&&
            <button className="btn btn-ghost" style={{fontSize:12,padding:'4px 10px',color:'var(--yellow)'}}
              onClick={e=>{e.stopPropagation();if(window.confirm('ส่งเคส '+c.caseid+' ขึ้นตลาด?'))api('sendToMarket',{caseId:c.caseid,sales:currentUser.name}).then(()=>load());}}>
              ⬆ ส่งตลาด
            </button>
          }
        </div>
      </div>)
    }
    {sel&&<CaseModal caseData={sel} users={users} currentUser={currentUser} onClose={()=>setSel(null)} onUpdated={load}/>}
  </div>;
}

// ============================================================
// SALES — CLAIMED CASES
// ============================================================
function SalesClaimedCases({currentUser,users}){
  const [cases,setCases]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [now,setNow]=useState(Date.now()); // tick ทุก 1 นาที เพื่ออัปเดต countdown

  const load=useCallback(()=>{setLoading(true);api('getClaimedCases',{sales:currentUser.name}).then(r=>{if(r.success)setCases(r.data||[]);setLoading(false);});},[currentUser.name]);
  useEffect(()=>{load();},[load]);

  // อัปเดต countdown ทุก 1 นาที
  useEffect(()=>{
    const t=setInterval(()=>setNow(Date.now()),60000);
    return ()=>clearInterval(t);
  },[]);

  // แปลง AssignedAt (dd/MM/yyyy HH:mm:ss) → Date object
  function parseAssignedAt(s){
    if(!s) return null;
    const m=String(s).match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);
    if(!m) return null;
    return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]),parseInt(m[4]),parseInt(m[5]));
  }

  // คืนได้หรือยัง? (ครบ 24 ชม. แล้ว)
  function canReturn(c){
    const dt=parseAssignedAt(c.AssignedAt||c['วันที่รับเคส']);
    if(!dt) return true; // ไม่มีข้อมูล → ให้คืนได้
    return (now - dt.getTime()) >= 24*3600*1000;
  }

  // เวลาที่เหลือ เช่น "18 ชม. 32 น."
  function timeLeft(c){
    const dt=parseAssignedAt(c.AssignedAt||c['วันที่รับเคส']);
    if(!dt) return '';
    const ms=24*3600*1000-(now-dt.getTime());
    if(ms<=0) return '';
    const h=Math.floor(ms/3600000);
    const min=Math.floor((ms%3600000)/60000);
    return h>0?`${h} ชม. ${min} น.`:`${min} น.`;
  }

  async function doReturn(caseId){
    const r=await api('returnCase',{caseId,sales:currentUser.name});
    if(!r.success){ alert(r.error||'ไม่สามารถคืนเคสได้'); return; }
    load();
  }

  return <div className="page">
    <div className="page-hd"><div className="page-title">📥 เคสที่รับจากตลาด</div><button className="btn btn-ghost" onClick={load}>🔄</button></div>
    {loading?<SkeletonCards n={3}/>:cases.length===0?<div style={{textAlign:'center',padding:40,color:'var(--text2)'}}>ยังไม่มีเคสที่รับจากตลาด</div>:
    cases.map((c,i)=>{
      const ok=canReturn(c);
      const left=timeLeft(c);
      return <div key={i} className="market-card" onClick={()=>setSel(c)} style={{cursor:'pointer'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
          <span style={{color:'var(--blue)',fontWeight:700}}>{c.caseID}</span>
          <StatusBadge status={c.newstatus||c.status}/>
        </div>
        <div style={{fontWeight:500,marginBottom:4}}>{c.customername}</div>
        <div style={{fontSize:12,color:'var(--text2)',marginBottom:6}}>
          รับมาจาก: <span style={{color:'var(--orange)'}}>{c.fromsales||'-'}</span>
          {' · '}รับเมื่อ: {String(c.AssignedAt||'').split(' ')[0]}
        </div>
        {/* แถบ countdown เมื่อยังล็อคอยู่ */}
        {!ok&&<div style={{
          display:'flex',alignItems:'center',gap:6,
          background:'rgba(210,153,34,.10)',border:'1px solid rgba(210,153,34,.35)',
          borderRadius:6,padding:'5px 10px',marginBottom:8,fontSize:12,color:'var(--yellow)'
        }}>
          🔒 คืนเคสได้หลังจากอีก <strong style={{marginLeft:4}}>{left}</strong>
        </div>}
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-ghost" style={{fontSize:12,padding:'4px 10px',color:'var(--green)'}} onClick={e=>{e.stopPropagation();copyText(formatContact(c.contact)||'');}}>
            <Ico.copy/> {formatContact(c.contact)||'ไม่มีเบอร์'}
          </button>
          {formatContact(c.contact)&&/^\d{9,10}$/.test(String(formatContact(c.contact)).replace(/\D/g,''))&&<a href={`tel:${formatContact(c.contact)}`} onClick={e=>e.stopPropagation()} className="contact-action-btn" style={{background:'rgba(63,185,80,.15)',color:'var(--green)',textDecoration:'none'}}><Ico.phone/>โทร</a>}
          {formatContact(c.contact)&&/^\d{9,10}$/.test(String(formatContact(c.contact)).replace(/\D/g,''))&&<a href={`https://line.me/ti/p/~${formatContact(c.contact)}`} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()} className="contact-action-btn" style={{background:'rgba(0,200,83,.15)',color:'#06c755',textDecoration:'none'}}>💬 Line</a>}
          <button
            className={ok?'btn btn-danger':'btn btn-ghost'}
            style={{fontSize:12,padding:'4px 10px',marginLeft:'auto',
              opacity:ok?1:0.45,cursor:ok?'pointer':'not-allowed',
              border:ok?'':'1px solid rgba(210,153,34,.35)',
              color:ok?'':'var(--yellow)'
            }}
            disabled={!ok}
            title={ok?'คืนเคสกลับตลาด':'ต้องรอ 24 ชม. หลังรับเคสก่อนคืนตลาด'}
            onClick={e=>{e.stopPropagation();if(ok)setConfirm(c.caseID);}}
          >
            {ok?'↩ คืนเคส':'🔒 ยังคืนไม่ได้'}
          </button>
        </div>
      </div>;
    })}
    {sel&&<CaseModal caseData={{...sel,caseid:sel.caseID}} users={users} currentUser={currentUser} onClose={()=>setSel(null)} onUpdated={load}/>}
    {confirm&&<Confirm msg={`คืนเคส ${confirm} กลับตลาด?`} onOk={()=>{doReturn(confirm);setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}
  </div>;
}

// ============================================================
// SALES — DASHBOARD  (Target + Achievement + Performance)
// ============================================================
function SalesDashboard({currentUser}){
  const [data,setData]=useState(null);
  const [allCases,setAllCases]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editTarget,setEditTarget]=useState(false);
  const [targetInput,setTargetInput]=useState('');
  const TARGET_KEY='cp_target_'+currentUser.userId;

  function getTarget(){try{return parseInt(localStorage.getItem(TARGET_KEY))||0;}catch(e){return 0;}}
  function saveTarget(){const t=parseInt(targetInput);if(t>0){try{localStorage.setItem(TARGET_KEY,String(t));}catch(e){}setEditTarget(false);}}

  const load=useCallback(()=>{
    cacheClear(['getDashboard']);
    setTargetInput(String(getTarget()||''));
    Promise.all([
      api('getDashboard',{role:'Sales',sales:currentUser.name}),
      api('getCases',{sales:currentUser.name,all:'true'})
    ]).then(([dr,cr])=>{
      if(dr.success)setData(dr.data);
      if(cr.success)setAllCases(cr.data||[]);
      setLoading(false);
    });
  },[currentUser.name]);
  useEffect(()=>{load();},[load]);

  if(loading)return <div className="page"><Loading/></div>;
  if(!data)return <div className="page"><p>ไม่พบข้อมูล</p></div>;

  // ── startdate helpers ──
  function parseStartDate(startdate){
    if(!startdate&&startdate!==0)return null;const s=String(startdate).trim();if(!s)return null;
    if(/^\d{4,6}$/.test(s)){const d=new Date((parseInt(s)-25569)*86400000);if(!isNaN(d))return d;}
    if(s.includes('/')){const p=s.split('/');if(p.length>=3){const p0=parseInt(p[0]),p1=parseInt(p[1]),p2=parseInt(p[2]);if(p[2].length===4){const d=new Date(p2,p1-1,p0);if(!isNaN(d))return d;}const d2=new Date(p2,p0-1,p1);if(!isNaN(d2))return d2;}}
    const d=new Date(s);return isNaN(d)?null:d;
  }
  function calcDays(sd){const d=parseStartDate(sd);if(!d)return null;const diff=Math.floor((Date.now()-d.getTime())/86400000);return diff>=0?diff:null;}
  function fmtStart(sd){const d=parseStartDate(sd);if(!d)return null;return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;}
  const startdate=data?.startdate||currentUser.startdate;
  const daysWorked=calcDays(startdate);
  const yearsMonths=daysWorked!=null?(()=>{const y=Math.floor(daysWorked/365),m=Math.floor((daysWorked%365)/30),d=daysWorked%30;if(y>0&&m>0)return`${y} ปี ${m} เดือน`;if(y>0)return`${y} ปี`;if(m>0&&d>0)return`${m} เดือน ${d} วัน`;if(m>0)return`${m} เดือน`;return`${daysWorked} วัน`;})():null;

  // ── Performance: 6 months ──
  const WIN_ST=['ปล่อยแล้ว'];
  const CLOSED_ST=['ปิดเคส','รีเจค','ปล่อยแล้ว','ได้รถจากที่อื่น','โยนเคส'];
  const months=Array.from({length:6},(_,i)=>{
    const d=new Date();d.setMonth(d.getMonth()-(5-i));
    const yy=String(d.getFullYear()).slice(-2),mm=String(d.getMonth()+1).padStart(2,'0');
    const pre=yy+mm;
    const label=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][d.getMonth()];
    const mc=allCases.filter(c=>String(c.caseid||'').startsWith(pre));
    const total=mc.length,won=mc.filter(c=>WIN_ST.includes(c.status)).length;
    return{pre,label,total,won,winRate:total>0?Math.round(won/total*100):0};
  });
  const curMonth=months[5];

  // ── Target ──
  const target=getTarget();
  const soldNow=curMonth.won;
  const pct=target>0?Math.min(Math.round(soldNow/target*100),100):0;

  // ── Badges ──
  const BADGES=[
    {id:'b1',icon:'🌱',label:'ก้าวแรก',req:1},
    {id:'b3',icon:'⭐',label:'ดาวขึ้น',req:3},
    {id:'b5',icon:'🔥',label:'กำลังมา',req:5},
    {id:'b10',icon:'💪',label:'เซลส์ร็อก',req:10},
    {id:'b20',icon:'💎',label:'ระดับเพชร',req:20},
  ];
  const earned=BADGES.filter(b=>soldNow>=b.req);
  const latest=earned[earned.length-1]||null;
  const nextB=BADGES.find(b=>soldNow<b.req)||null;

  return <div className="page">
    <div className="page-hd"><div className="page-title">📊 แดชบอร์ดของฉัน</div>
      <button className="btn btn-ghost" style={{fontSize:13}} onClick={load}>🔄</button>
    </div>

    {/* Profile */}
    <div style={{display:'flex',gap:12,marginBottom:18,alignItems:'center'}}>
      <div style={{width:64,height:64,borderRadius:'50%',background:'var(--bg3)',border:'2px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',flexShrink:0}}>
        {currentUser.avatar?<img src={currentUser.avatar} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<Ico.user/>}
      </div>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,fontSize:18,display:'flex',alignItems:'center',gap:8}}>
          {currentUser.name}{latest&&<span title={latest.label} style={{fontSize:22}}>{latest.icon}</span>}
        </div>
        <div style={{fontSize:13,color:'var(--text2)'}}>Sales · ประจำเดือนนี้</div>
        {startdate&&<div style={{marginTop:5,display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:12,color:'var(--text3)'}}>📅 เริ่ม {fmtStart(startdate)}</span>
          {yearsMonths&&<span style={{fontSize:12,fontWeight:700,background:'rgba(88,166,255,.12)',color:'var(--blue)',border:'1px solid rgba(88,166,255,.25)',borderRadius:20,padding:'2px 10px'}}>⏱ {yearsMonths}</span>}
        </div>}
      </div>
    </div>

    {/* KPI */}
    <div className="stat-grid" style={{marginBottom:14}}>
      {[['เคสของฉัน',data.currentCases||0,'var(--blue)'],['รับตลาด',data.claimedCases||0,'var(--purple)'],['ปล่อยแล้ว',data.sold||0,'var(--green)']].map(([l,v,c])=>
        <div key={l} className="stat-card"><div className="stat-num" style={{color:c}}>{v}</div><div className="stat-lbl">{l}</div></div>
      )}
    </div>

    {/* ── Target ── */}
    <div className="card" style={{marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontWeight:700,fontSize:14}}>🎯 เป้าหมายเดือนนี้</div>
        <button className="btn btn-ghost" style={{fontSize:12,padding:'3px 10px'}} onClick={()=>{setTargetInput(String(target||''));setEditTarget(v=>!v);}}>
          {editTarget?'ยกเลิก':'✏️ ตั้งเป้า'}
        </button>
      </div>
      {editTarget&&<div style={{display:'flex',gap:8,marginBottom:12}}>
        <input type="number" value={targetInput} onChange={e=>setTargetInput(e.target.value)} placeholder="จำนวนเคสที่ต้องปล่อย" style={{flex:1}} min={1}/>
        <button className="btn btn-primary" style={{padding:'8px 16px'}} onClick={saveTarget}>บันทึก</button>
      </div>}
      {target>0?<>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontSize:13,color:'var(--text2)'}}>ปล่อยแล้ว {soldNow} / {target} เคส</span>
          <span style={{fontSize:14,fontWeight:700,color:pct>=100?'var(--green)':pct>=70?'var(--blue)':'var(--yellow)'}}>{pct}%</span>
        </div>
        <div style={{height:10,background:'var(--bg3)',borderRadius:6,overflow:'hidden',marginBottom:8}}>
          <div style={{height:'100%',borderRadius:6,transition:'width .5s',background:pct>=100?'var(--green)':pct>=70?'var(--blue)':'var(--yellow)',width:`${pct}%`}}/>
        </div>
        {pct>=100?<div style={{fontSize:12,color:'var(--green)',fontWeight:700}}>🎉 บรรลุเป้าหมายแล้ว! ยอดเยี่ยมมาก!</div>
        :<div style={{fontSize:12,color:'var(--text2)'}}>เหลืออีก <strong style={{color:'var(--blue)'}}>{target-soldNow}</strong> เคสถึงเป้า</div>}
      </>:<div style={{fontSize:13,color:'var(--text3)',textAlign:'center',padding:'6px 0'}}>กดตั้งเป้าหมายเพื่อติดตามความคืบหน้า</div>}
    </div>

    {/* ── Achievements ── */}
    <div className="card" style={{marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>🏆 Achievement เดือนนี้</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {BADGES.map(b=>{const ok=soldNow>=b.req;return <div key={b.id} className="ach-badge" title={`${b.label}: ปิดได้ ${b.req} เคส`}
          style={{background:ok?'rgba(88,166,255,.08)':'var(--bg3)',border:`1px solid ${ok?'rgba(88,166,255,.3)':'var(--border)'}`,opacity:ok?1:.38,filter:ok?'none':'grayscale(1)'}}>
          <span style={{fontSize:24}}>{b.icon}</span>
          <span style={{fontSize:11,fontWeight:700,color:ok?'var(--text)':'var(--text3)'}}>{b.label}</span>
          <span style={{fontSize:10,color:'var(--text3)'}}>{b.req} เคส</span>
        </div>;})}
      </div>
      {nextB&&<div style={{fontSize:12,color:'var(--text2)',marginTop:10,background:'var(--bg3)',padding:'8px 12px',borderRadius:8}}>
        🎯 ปิดอีก <strong style={{color:'var(--blue)'}}>{nextB.req-soldNow}</strong> เคส รับ {nextB.icon} <strong>{nextB.label}</strong>
      </div>}
    </div>

    {/* ── Performance 6 months ── */}
    <div className="card" style={{marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>📈 ผลงาน 6 เดือนล่าสุด</div>
      <div style={{height:180}}>
        <BarChart id="perfBar6"
          labels={months.map(m=>m.label)}
          datasets={[
            {label:'เคสทั้งหมด',data:months.map(m=>m.total),backgroundColor:'rgba(88,166,255,.5)'},
            {label:'ปล่อยแล้ว',data:months.map(m=>m.won),backgroundColor:'rgba(63,185,80,.8)'},
          ]}
        />
      </div>
      <div style={{display:'flex',gap:6,marginTop:12,overflowX:'auto',paddingBottom:2}}>
        {months.map((m,i)=><div key={i} style={{flex:1,minWidth:44,textAlign:'center',background:'var(--bg3)',borderRadius:8,padding:'6px 4px',border:i===5?'1px solid var(--blue)':'1px solid transparent'}}>
          <div style={{fontSize:10,color:'var(--text3)',marginBottom:2}}>{m.label}</div>
          <div style={{fontSize:14,fontWeight:800,color:m.winRate>=50?'var(--green)':m.winRate>0?'var(--yellow)':'var(--text3)'}}>{m.winRate}%</div>
          <div style={{fontSize:10,color:'var(--text3)'}}>Win</div>
        </div>)}
      </div>
    </div>

    {/* สถานะ breakdown */}
    {data.statuses&&Object.keys(data.statuses).length>0&&<div className="card">
      <div style={{fontWeight:600,marginBottom:12}}>สถานะเคส</div>
      {Object.entries(data.statuses).map(([s,v])=><div key={s} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <StatusBadge status={s}/><span style={{fontWeight:700}}>{v}</span>
      </div>)}
    </div>}
  </div>;
}

// ============================================================
// ADMIN — MANAGE USERS
// ============================================================
function AdminUsers({currentUser}){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({username:'',password:'1234',name:'',role:'Sales'});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const load=()=>{setLoading(true);api('getUsers').then(r=>{if(r.success)setUsers(r.data||[]);setLoading(false);});};
  useEffect(()=>{load();},[]);

  async function addUser(){
    if(!form.username||!form.name)return alert('กรอกชื่อและ username');
    await api('addUser',form);load();setShowAdd(false);setForm({username:'',password:'1234',name:'',role:'Sales'});
  }

  return <div className="page">
    <div className="page-hd">
      <div className="page-title">👥 จัดการผู้ใช้</div>
      <button className="btn btn-primary" onClick={()=>setShowAdd(true)}><Ico.plus/> เพิ่มผู้ใช้</button>
    </div>
    <div className="card" style={{padding:0}}>
      <div className="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Username</th><th>ชื่อ</th><th>Role</th><th>สถานะ</th></tr></thead>
          <tbody>
            {loading?<SkeletonRows n={5} cols={5}/> :
            users.map((u,i)=><tr key={i}>
              <td style={{fontSize:12,color:'var(--text2)'}}>{u.userId}</td>
              <td style={{fontWeight:600}}>{u.username}</td>
              <td>{u.name}</td>
              <td><span className={`badge ${u.role==='Admin'?'s-approve':'s-book'}`}>{u.role}</span></td>
              <td><span className={`badge ${u.status==='active'?'s-go':'s-reject'}`}>{u.status}</span></td>
            </tr>)}
          </tbody>
        </table>
      </div>
    </div>
    {showAdd&&<Modal title="เพิ่มผู้ใช้ใหม่" onClose={()=>setShowAdd(false)} footer={<>
      <button className="btn btn-ghost" onClick={()=>setShowAdd(false)}>ยกเลิก</button>
      <button className="btn btn-primary" onClick={addUser}>บันทึก</button>
    </>}>
      <div style={{display:'grid',gap:12}}>
        <div className="form-group"><label>Username</label><input value={form.username} onChange={e=>set('username',e.target.value)}/></div>
        <div className="form-group"><label>รหัสผ่าน</label><input value={form.password} onChange={e=>set('password',e.target.value)}/></div>
        <div className="form-group"><label>ชื่อที่แสดง</label><input value={form.name} onChange={e=>set('name',e.target.value)}/></div>
        <div className="form-group"><label>Role</label><select value={form.role} onChange={e=>set('role',e.target.value)}><option>Sales</option><option>Admin</option></select></div>
      </div>
    </Modal>}
  </div>;
}

// ============================================================
// LOGIN PAGE
// ============================================================
function LoginPage({onLogin}){
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [showPass,setShowPass]=useState(false);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');

  async function submit(){
    if(!username||!password)return setError('กรุณากรอกข้อมูลให้ครบ');
    setLoading(true);setError('');
    const r=await api('login',{username,password});
    setLoading(false);
    if(r.success)onLogin(r.user);
    else setError(r.error||'เข้าสู่ระบบไม่สำเร็จ');
  }

  return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:16}}>
    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:16,padding:32,width:'100%',maxWidth:380,boxShadow:'var(--shadow)'}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontSize:40,marginBottom:8}}>🚗</div>
        <div style={{fontSize:22,fontWeight:800,color:'var(--text)'}}>CasePool</div>
        <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>ระบบจัดการเคสรถยนต์</div>
      </div>
      {!API_URL&&<div style={{background:'rgba(210,153,34,.1)',border:'1px solid var(--yellow)',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:12,color:'var(--yellow)'}}>
        ⚙️ Demo Mode — ยังไม่ได้เชื่อม Google Sheets<br/>ลอง: admin/admin1234 หรือ fab/fab1234
      </div>}
      {error&&<div style={{background:'rgba(248,81,73,.1)',border:'1px solid var(--red)',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:13,color:'var(--red)'}}>{error}</div>}
      <div className="form-group"><label>Username</label><input value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="กรอก Username ของคุณ" autoComplete="username"/></div>
      <div className="form-group">
        <label>รหัสผ่าน</label>
        <div style={{position:'relative'}}>
          <input type={showPass?'text':'password'} value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} autoComplete="current-password"/>
          <button onClick={()=>setShowPass(!showPass)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:14}}>{showPass?'🙈':'👁'}</button>
        </div>
      </div>
      <button className="btn btn-primary" onClick={submit} disabled={loading} style={{width:'100%',padding:'10px',fontSize:15,marginTop:4}}>
        {loading?'⏳ กำลังเข้าสู่ระบบ...':'เข้าสู่ระบบ →'}
      </button>
    </div>
  </div>;
}

// ============================================================
// ADMIN APP
// ============================================================
function AdminApp({currentUser,onLogout}){
  const [page,setPage]=useState('cases');
  const [users,setUsers]=useState([]);
  const [showNotif,setShowNotif]=useState(false);
  const [notifCount,setNotifCount]=useState(0);

  useEffect(()=>{
    api('getUsers').then(r=>{if(r.success)setUsers(r.data||[]);});
    api('getNotifications',{sales:'admin'}).then(r=>{if(r.success){const u=r.data.filter(n=>n['สถานะ']==='unread');setNotifCount(u.length);}});
  },[]);

  const pages={cases:<AdminCurrentCases currentUser={currentUser} users={users}/>,market:<AdminMarket currentUser={currentUser} users={users}/>,dashboard:<AdminDashboard currentUser={currentUser}/>,bookings:<AdminBookings currentUser={currentUser} users={users}/>,users:<AdminUsers currentUser={currentUser}/>};

  const navItems=[
    {key:'cases',icon:<Ico.home/>,label:'เคสปัจจุบัน'},
    {key:'market',icon:<Ico.market/>,label:'ตลาดเคส'},
    {key:'dashboard',icon:<Ico.dash/>,label:'แดชบอร์ด'},
    {key:'bookings',icon:<Ico.book/>,label:'การจอง'},
    {key:'users',icon:<Ico.user/>,label:'ผู้ใช้'},
  ];

  return <div>
    <div className="sidebar">
      <div className="sidebar-logo">
        <div style={{fontWeight:800,fontSize:18,color:'var(--blue)'}}>🚗 CasePool</div>
        <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>Admin Panel</div>
      </div>
      <nav className="sidebar-nav">
        {navItems.map(n=><div key={n.key} className={`nav-item ${page===n.key?'active':''}`} onClick={()=>setPage(n.key)}>
          {n.icon}<span>{n.label}</span>
        </div>)}
      </nav>
      <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
            {currentUser.avatar?<img src={currentUser.avatar} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<Ico.user/>}
          </div>
          <div><div style={{fontWeight:600,fontSize:13}}>{currentUser.name}</div><div style={{fontSize:11,color:'var(--text2)'}}>Admin</div></div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-ghost" style={{flex:1,fontSize:12,position:'relative'}} onClick={()=>setShowNotif(!showNotif)}>
            <Ico.bell/>{notifCount>0&&<span style={{position:'absolute',top:2,right:4,background:'var(--red)',width:16,height:16,borderRadius:'50%',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>{notifCount}</span>}
          </button>
          <button className="btn btn-ghost" style={{flex:1,fontSize:12}} onClick={()=>toggleTheme()} title="เปลี่ยนธีม">🌓</button>
          <button className="btn btn-ghost" style={{flex:1,fontSize:12}} onClick={onLogout}><Ico.logout/></button>
        </div>
      </div>
    </div>
    <div className="main-content">{pages[page]||pages.cases}</div>
    {showNotif&&<NotifPanel user={currentUser} onClose={()=>setShowNotif(false)} onCountChange={setNotifCount}/>}
  </div>;
}

// ============================================================
// SALES APP
// ============================================================
function SalesApp({currentUser,onLogout}){
  const [page,setPage]=useState('focus');
  const [users,setUsers]=useState([]);
  const [showNotif,setShowNotif]=useState(false);
  const [notifCount,setNotifCount]=useState(0);
  const [showSearch,setShowSearch]=useState(false);
  const [showOnboarding,setShowOnboarding]=useState(false);

  // Push notifications (Web Notification API polling)
  usePushNotif(API_URL, currentUser.name);

  useEffect(()=>{
    api('getUsers').then(r=>{if(r.success)setUsers(r.data||[]);});
    function refreshNotif(){api('getNotifications',{sales:currentUser.name}).then(r=>{if(r.success){const u=r.data.filter(n=>n['สถานะ']==='unread');setNotifCount(u.length);}});}
    refreshNotif();
    const t=setInterval(refreshNotif,30000);
    try{if(!localStorage.getItem('cp_onboarded_'+currentUser.userId))setShowOnboarding(true);}catch(e){}
    return ()=>clearInterval(t);
  },[currentUser.name,currentUser.userId]);

  const pages={
    focus:    <><PushNotifBanner currentUser={currentUser}/><DailyFocusPage currentUser={currentUser} onNavigate={k=>setPage(k)}/></>,
    market:   <SalesMarket currentUser={currentUser}/>,
    cases:    <SalesCurrentCases currentUser={currentUser} users={users}/>,
    claimed:  <SalesClaimedCases currentUser={currentUser} users={users}/>,
    ai:       <AIAdvisorPage currentUser={currentUser}/>,
    dashboard:<SalesDashboard currentUser={currentUser}/>,
  };

  const navItems=[
    {key:'focus',    icon:<Ico.focus/>,  label:'วันนี้'},
    {key:'market',   icon:<Ico.market/>, label:'ตลาด'},
    {key:'cases',    icon:<Ico.home/>,   label:'เคสของฉัน'},
    {key:'claimed',  icon:<Ico.inbox/>,  label:'รับตลาด'},
    {key:'ai',       icon:<Ico.ai/>,     label:'AI'},
    {key:'dashboard',icon:<Ico.trophy/>, label:'แดชบอร์ด'},
  ];

  return <div>
    {showOnboarding&&<OnboardingTour currentUser={currentUser} onDone={()=>setShowOnboarding(false)}/>}
    {showSearch&&<GlobalSearch currentUser={currentUser} onClose={()=>setShowSearch(false)} onNavigate={k=>{setPage(k);setShowSearch(false);}}/>}

    {/* Top bar */}
    <div style={{position:'fixed',top:0,left:0,right:0,height:56,background:'var(--bg2)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',zIndex:50}}>
      <div style={{fontWeight:800,color:'var(--blue)',display:'flex',alignItems:'center',gap:8}}>🚗 CasePool</div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button className="btn btn-ghost" style={{padding:'5px 8px'}} title="ค้นหาเคส" onClick={()=>setShowSearch(true)}><Ico.gsearch/></button>
        <button className="btn btn-ghost" style={{padding:'4px 8px'}} onClick={()=>toggleTheme()} title="เปลี่ยนธีม">🌓</button>
        <button className="btn btn-ghost" style={{padding:'4px 8px',position:'relative'}} onClick={()=>setShowNotif(!showNotif)}>
          <Ico.bell/>
          {notifCount>0&&<span style={{position:'absolute',top:0,right:0,background:'var(--red)',width:16,height:16,borderRadius:'50%',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>{notifCount}</span>}
        </button>
        <button className="btn btn-ghost" style={{padding:'4px 8px'}} onClick={onLogout}><Ico.logout/></button>
      </div>
    </div>

    <div style={{paddingTop:56}}>{pages[page]||pages.focus}</div>

    {/* Bottom Nav */}
    <div className="bottom-nav">
      {navItems.map(n=><div key={n.key} className={`bottom-nav-item ${page===n.key?'active':''}`} onClick={()=>setPage(n.key)}>
        {n.icon}<span>{n.label}</span>
      </div>)}
    </div>

    {showNotif&&<NotifPanel user={currentUser} onClose={()=>setShowNotif(false)} onCountChange={setNotifCount}/>}
  </div>;
}

// ============================================================
// ROOT APP
// ============================================================
function App(){
  const [user,setUser]=useState(()=>{
    try{const s=sessionStorage.getItem('casepool_user');return s?JSON.parse(s):null;}catch{return null;}
  });

  const [showLogoutConfirm,setShowLogoutConfirm]=useState(false);

  function handleLogin(u){
    sessionStorage.setItem('casepool_user',JSON.stringify(u));
    setUser(u);
  }
  function handleLogout(){
    sessionStorage.removeItem('casepool_user');
    // ล้าง cache ทั้งหมดตอน logout
    Object.keys(_cache).forEach(k=>delete _cache[k]);
    setUser(null);
    setShowLogoutConfirm(false);
  }

  if(!user) return <LoginPage onLogin={handleLogin}/>;

  const logoutConfirmModal = showLogoutConfirm && (
    <div className="overlay" style={{zIndex:9999}}>
      <div className="modal" style={{maxWidth:320}}>
        <div className="modal-bd" style={{textAlign:'center',padding:'32px 24px'}}>
          <div style={{fontSize:40,marginBottom:12}}>👋</div>
          <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>ออกจากระบบ?</div>
          <div style={{fontSize:13,color:'var(--text2)',marginBottom:24}}>
            {user.name} · {user.role}
          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-ghost" style={{flex:1,padding:'10px'}}
              onClick={()=>setShowLogoutConfirm(false)}>
              ยกเลิก
            </button>
            <button className="btn btn-danger" style={{flex:1,padding:'10px'}}
              onClick={handleLogout}>
              ออกจากระบบ
            </button>
          </div>
        </div>
      </div>
    </div>
  );

  if(user.role==='Admin') return <>{logoutConfirmModal}<AdminApp currentUser={user} onLogout={()=>setShowLogoutConfirm(true)}/></>;
  return <>{logoutConfirmModal}<SalesApp currentUser={user} onLogout={()=>setShowLogoutConfirm(true)}/></>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
