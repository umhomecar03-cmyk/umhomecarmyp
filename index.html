<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Sarabun',sans-serif;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --blue:#58a6ff;--blue2:#1f6feb;--green:#3fb950;--red:#f85149;
  --yellow:#d29922;--purple:#bc8cff;--orange:#ffa657;--cyan:#39d353;
  --radius:8px;--shadow:0 8px 24px rgba(0,0,0,.4);
}
body.light{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f6f8fa;--bg4:#d0d7de;
  --border:#d0d7de;--text:#1f2328;--text2:#656d76;--text3:#848d97;
  --blue:#0969da;--blue2:#0550ae;--green:#1a7f37;--red:#cf222e;
  --yellow:#9a6700;--purple:#8250df;--orange:#bc4c00;
  --shadow:0 8px 24px rgba(0,0,0,.12);
}
body{background:var(--bg);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.btn{cursor:pointer;border:none;border-radius:6px;padding:8px 16px;font-size:14px;font-weight:600;transition:all .15s;}
.btn-primary{background:var(--blue2);color:#fff;}
.btn-primary:hover{background:#388bfd;}
.btn-danger{background:#da3633;color:#fff;}
.btn-danger:hover{background:#f85149;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.btn-green{background:#238636;color:#fff;}
.btn-green:hover{background:#2ea043;}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:14px;outline:none;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
select option{background:var(--bg3);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-bd{padding:20px;}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{background:var(--bg3);padding:10px 12px;text-align:left;color:var(--text2);font-weight:600;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
tr:hover td{background:rgba(255,255,255,.02);}
tr.clickable{cursor:pointer;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:12px;}
/* Sidebar */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);}
.sidebar-nav{flex:1;padding:8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;cursor:pointer;margin-bottom:2px;color:var(--text2);font-size:14px;transition:all .15s;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:#1f6feb22;color:var(--blue);border-left:3px solid var(--blue);}
.main-content{margin-left:220px;min-height:100vh;}
/* Bottom Nav (mobile) */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:50;}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;color:var(--text2);font-size:11px;gap:2px;}
.bottom-nav-item.active{color:var(--blue);}
@media(max-width:768px){
  .sidebar{display:none;}
  .main-content{margin-left:0;padding-bottom:70px;}
  .bottom-nav{display:flex;}
}
.page{padding:20px;}
.page-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-title{font-size:20px;font-weight:700;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;}
.stat-num{font-size:28px;font-weight:800;}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:4px;}
/* Status colors */
.s-wait{background:#3a3d42;color:#ffffff;border:1px solid #6e7681;}
.s-go{background:#1a4731;color:#3fb950;}
.s-nurse{background:#3d2b00;color:#ffa657;}
.s-half{background:#2d1b00;color:#d29922;}
.s-cant{background:#3d1515;color:#f85149;}
.s-later{background:#2b1f3d;color:#bc8cff;}
.s-book{background:#0d2149;color:#58a6ff;}
.s-sign{background:#0d3149;color:#39d353;}
.s-wait2{background:#1a2a3d;color:#79c0ff;}
.s-approve{background:#132d18;color:#3fb950;}
.s-close{background:#5a0a0a;color:#ff6b6b;}
.s-reject{background:#3d0a0a;color:#f85149;}
.s-release{background:#0a2418;color:#3fb950;}
.s-other{background:#2d1500;color:#ffa657;}
.s-throw{background:#3d2e00;color:#ffd700;}
/* Market Card (old - for other pages) */
.market-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.market-card:hover{border-color:var(--blue2);}
/* New Market Layout */
.mk-page{display:flex;flex-direction:column;min-height:100vh;}
.mk-hero{background:linear-gradient(135deg,#0d1b2a 0%,#1a2744 60%,#0f2233 100%);padding:24px 24px 0;border-bottom:1px solid var(--border);}
.mk-hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.mk-stats{display:flex;gap:4px;}
.mk-stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 20px;text-align:center;min-width:90px;}
.mk-stat-num{font-size:26px;font-weight:800;line-height:1;}
.mk-stat-lbl{font-size:11px;color:var(--text2);margin-top:3px;}
.mk-body{display:flex;flex:1;gap:0;}
.mk-cards-area{flex:1;padding:20px;min-width:0;}
.mk-sidebar{width:280px;flex-shrink:0;border-left:1px solid var(--border);padding:16px;background:var(--bg2);}
.mk-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.mkc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .2s;cursor:default;}
.mkc:hover{border-color:var(--blue2);box-shadow:0 4px 20px rgba(31,111,235,.15);}
.mkc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.mkc-id{font-size:15px;font-weight:800;color:var(--blue);}
.mkc-date{font-size:11px;background:#2d2000;color:var(--yellow);padding:3px 8px;border-radius:20px;border:1px solid #4a3500;}
.mkc-name{font-size:15px;font-weight:700;margin-bottom:8px;}
.mkc-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.mkc-contact{font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.mkc-report{font-size:12px;color:var(--text2);background:var(--bg3);padding:8px 10px;border-radius:6px;margin-bottom:12px;line-height:1.6;max-height:72px;overflow:hidden;}
.mkc-actions{display:flex;gap:8px;}
.btn-claim{flex:1;background:var(--blue2);color:#fff;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-claim:hover{background:#388bfd;transform:translateY(-1px);}
.btn-claim:disabled{background:#1a3a5c;color:#4a7ab5;cursor:not-allowed;transform:none;}
.btn-skip{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;transition:all .15s;}
.btn-skip:hover{background:var(--bg4);}
.mk-sb-section{margin-bottom:20px;}
.mk-sb-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px;}
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.lb-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.sb-stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg3);border-radius:8px;margin-bottom:6px;}
@media(max-width:900px){.mk-sidebar{display:none;}}
@media(max-width:600px){.mk-cards-grid{grid-template-columns:1fr;}.mk-hero{padding:16px 16px 0;}.mk-cards-area{padding:12px;}.mk-stats{flex-wrap:wrap;gap:6px;}.mk-stat{min-width:70px;padding:10px 12px;}}
/* ── Daily Focus ── */
.focus-block{border-radius:10px;padding:14px 16px;margin-bottom:12px;}
/* ── Achievement ── */
.ach-badge{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 12px;border-radius:10px;min-width:60px;transition:all .2s;}
/* ── Onboarding ── */
.onboard-progress-dot{height:6px;border-radius:3px;transition:all .3s;}
/* ── Global Search ── */
.gs-result{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.gs-result:hover{background:var(--bg3);}
/* ── Mobile tel/line btns ── */
.contact-action-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s;}
/* ── AI Advisor ── */
.ai-card{border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border);background:var(--bg2);}
.ai-rank{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;}
.ai-stream{white-space:pre-wrap;line-height:1.8;font-size:14px;color:var(--text);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-cursor{display:inline-block;width:2px;height:14px;background:var(--blue);margin-left:2px;animation:pulse .8s infinite;vertical-align:middle;}
/* ── Push Notif permission card ── */
.pn-banner{border-radius:12px;padding:14px 16px;background:linear-gradient(135deg,rgba(88,166,255,.1),rgba(188,140,255,.08));border:1px solid rgba(88,166,255,.25);}
/* Notif dot */
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;display:inline-block;}
/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text2);}
.spin{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:800px 100%;animation:shimmer 1.4s infinite;border-radius:6px;}

.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.search-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.tag{padding:2px 8px;border-radius:20px;font-size:12px;background:var(--bg3);border:1px solid var(--border);}
</style>
</head>

<script type="text/babel">
const {useState,useEffect,useCallback,useRef,createContext,useContext} = React;

// ============================================================
// ⚙️ CONFIG — ใส่ URL ของ Apps Script Web App ตรงนี้
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbw_E_TBpe_2HMjcbMftukS2aJkQjvXcVlf7uQ9T1Xn1kdGdVLmVaOLfZeMMGk7hdG3vzw/exec';

// ── Theme persistence ──
(function(){
  try{ if(localStorage.getItem('cp_theme')==='light') document.body.classList.add('light'); }catch(e){}
})();
function toggleTheme(){
  document.body.classList.toggle('light');
  try{ localStorage.setItem('cp_theme', document.body.classList.contains('light')?'light':'dark'); }catch(e){}
}

// ── Copy to clipboard + toast ──
let _copyToastTimer=null;
function copyText(text){
  try{ navigator.clipboard.writeText(text||''); }catch(e){}
  // ลบ toast เก่าถ้ามี
  if(_copyToastTimer) clearTimeout(_copyToastTimer);
  let el=document.getElementById('cp-copy-toast');
  if(!el){
    el=document.createElement('div');
    el.id='cp-copy-toast';
    Object.assign(el.style,{
      position:'fixed',bottom:'80px',left:'50%',transform:'translateX(-50%) translateY(20px)',
      background:'rgba(63,185,80,.95)',color:'#fff',padding:'9px 22px',
      borderRadius:'30px',fontSize:'13px',fontWeight:'700',
      boxShadow:'0 6px 24px rgba(0,0,0,.4)',zIndex:'9999',
      transition:'opacity .25s, transform .25s',opacity:'0',pointerEvents:'none',
      whiteSpace:'nowrap',letterSpacing:'.3px',display:'flex',alignItems:'center',gap:'6px'
    });
    document.body.appendChild(el);
  }
  el.innerHTML='✅&nbsp; คัดลอกแล้ว!';
  el.style.opacity='1';
  el.style.transform='translateX(-50%) translateY(0)';
  _copyToastTimer=setTimeout(()=>{
    el.style.opacity='0';
    el.style.transform='translateX(-50%) translateY(10px)';
  },1800);
}

// ============================================================
// CONSTANTS
// ============================================================
const STATUSES = ['รอข้อมูล','ไปต่อได้','เคสเลี้ยง','เคสวัด 50/50','ติดต่อไม่ได้','ยังไม่สะดวก','จอง','รอเซ็นต์','รอผล','อนุมัติ','ปิดเคส','รีเจค','ปล่อยแล้ว','ได้รถจากที่อื่น','โยนเคส'];
const BOOK_STATUSES = ['จองแล้ว','รอเซ็นต์','รอผล','อนุมัติ','ปล่อยรถ','รีเจค','ปิดเคส'];
const CONTACT_BY = ['เบอร์','ไลน์','QR Code','เบอร์&ไลน์'];
const SENT_TYPES = ['ปกติ','ส่วนตัว'];
const CAR_MODELS = {
  Honda:['Civic FC','Civic FK','Civic FE','City','Jazz','HR-V','CR-V','Accord','Mobilio'],
  Toyota:['Yaris','Vios','Altis','Revo','VIGO','Fortuner','Cross','C-HR','Camry','Veloz','Alphard','Sienta','Avanza','Prius','Innova'],
  Isuzu:['D-Max','MU-X','MU-7','X-Series'],
  Mazda:['2','3','CX-3','CX-30','BT-50'],
  MG:['3','5','ZS'],
  Nissan:['Navara','Almera','Note','March','Sylphy','Teana','Juke'],
  Mitsubishi:['Triton','Mirage','Attrage','Xpander','Pajero'],
  Suzuki:['Swift','Ciaz','Carry']
};

function getStatusClass(s){
  const m={'รอข้อมูล':'s-wait','ไปต่อได้':'s-go','เคสเลี้ยง':'s-nurse','เคสวัด 50/50':'s-half','ติดต่อไม่ได้':'s-cant','ยังไม่สะดวก':'s-later','จอง':'s-book','รอเซ็นต์':'s-sign','รอผล':'s-wait2','อนุมัติ':'s-approve','ปิดเคส':'s-close','รีเจค':'s-reject','ปล่อยแล้ว':'s-release','ได้รถจากที่อื่น':'s-other','โยนเคส':'s-throw','จองแล้ว':'s-book'};
  return m[s]||'s-wait';
}

function displayContact(contact){
  if(!contact&&contact!==0) return '-';
  const s=String(contact).trim();
  if(s.startsWith('data:image')||s.startsWith('https://drive.google.com')) return '📷 QR Code';
  return formatContact(s)||'-';
}
function formatContact(contact){
  if(!contact&&contact!==0) return '';
  const s=String(contact).trim();
  if(s.startsWith('http')||s.startsWith('data:')) return s;
  // เบอร์ไทย 10 หลัก ถ้า Sheets ตัด 0 จะเหลือ 9 หลัก
  if(/^\d{9}$/.test(s)) return '0'+s;
  // เผื่อ 8 หลัก (เบอร์บ้าน)
  if(/^\d{8}$/.test(s)) return '0'+s;
  return s;
}

// ============================================================
// API + CACHE LAYER
// ============================================================
const _cache = {};          // key → {data, ts}
const CACHE_TTL = 30000;    // 30 วินาที

function cacheKey(action, data){
  return action + ':' + JSON.stringify(data||{});
}
function cacheGet(action, data){
  const k = cacheKey(action, data);
  const c = _cache[k];
  if(c && (Date.now() - c.ts) < CACHE_TTL) return c.data;
  return null;
}
function cacheSet(action, data, result){
  _cache[cacheKey(action, data)] = {data: result, ts: Date.now()};
}
function cacheClear(patterns){
  // ล้าง cache ที่เกี่ยวข้อง เช่น ['getCases','getDashboard']
  (patterns||[]).forEach(p=>{
    Object.keys(_cache).forEach(k=>{ if(k.startsWith(p)) delete _cache[k]; });
  });
}

const CACHEABLE = ['getCases','getMarket','getUsers','getBookings','getDashboard','getNotifications','getClaimedCases'];
// actions ที่ทำให้ cache invalidate
const INVALIDATE_MAP = {
  addCase:      ['getCases','getDashboard'],
  updateCase:   ['getCases','getDashboard'],
  sendToMarket: ['getCases','getMarket','getDashboard'],
  claimCase:    ['getMarket','getClaimedCases','getDashboard'],
  returnCase:   ['getMarket','getClaimedCases'],
  updateClaimed:['getClaimedCases'],
  closeMarketCase:['getMarket','getCases'],
  adminChangeSales:['getCases'],
  adminPullCase:['getCases'],
  deleteCase:     ['getCases','getMarket','getDashboard'],
  addBooking:   ['getBookings'],
  updateBooking:['getBookings'],
};

async function api(action, data={}) {
  if(!API_URL) return demoApi(action, data);

  const isGet = ['getCases','getMarket','getUsers','getBookings','getDashboard','getHistory','getNotifications','getClaimedCases','searchCases'].includes(action);

  // ใช้ cache สำหรับ GET actions
  if(CACHEABLE.includes(action)){
    const cached = cacheGet(action, data);
    if(cached) return cached;
  }

  try {
    let url, opts;
    if(isGet) {
      const q=new URLSearchParams({action,...data}).toString();
      url=API_URL+'?'+q;
      opts={method:'GET',redirect:'follow',mode:'cors'};
    } else {
      url=API_URL+'?action='+action;
      opts={method:'POST',redirect:'follow',mode:'cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)};
    }
    const r=await fetch(url, opts);
    const text=await r.text();
    let result;
    try{result=JSON.parse(text);}catch(e){result={success:false,error:'Parse error: '+text.slice(0,100)};}

    // เก็บ cache และ invalidate
    if(CACHEABLE.includes(action) && result.success) cacheSet(action, data, result);
    if(INVALIDATE_MAP[action]) cacheClear(INVALIDATE_MAP[action]);

    return result;
  } catch(e) {
    return {success:false,error:e.toString()};
  }
}

function demoApi(action, data){
  switch(action){
    case 'login': {
      const u=DEMO.users.find(x=>x.username===data.username&&x.password===data.password&&x.status==='active');
      if(!u) return {success:false,error:'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'};
      return {success:true,user:{...u}};
    }
    case 'getUsers': return {success:true,data:DEMO.users};
    case 'getCases': return {success:true,data:data.sales&&data.sales!=='all'?DEMO.cases.filter(c=>c.sales===data.sales):DEMO.cases};
    case 'addCase': {
      const d=new Date(),yy=String(d.getFullYear()).slice(-2),mm=String(d.getMonth()+1).padStart(2,'0');
      const pre=yy+mm,max=DEMO.cases.filter(c=>String(c.caseid).startsWith(pre)).reduce((m,c)=>{const n=parseInt(String(c.caseid).slice(4))||0;return n>m?n:m;},0);
      const id=pre+String(max+1).padStart(3,'0');
      DEMO.cases.push({caseid:id,...data,createdat:new Date().toLocaleString('th-TH'),updatedat:new Date().toLocaleString('th-TH')});
      return {success:true,caseId:id};
    }
    case 'updateCase': {
      const idx=DEMO.cases.findIndex(c=>String(c.caseid)===String(data.caseid));
      if(idx>=0) Object.assign(DEMO.cases[idx],data,{updatedat:new Date().toLocaleString('th-TH')});
      return {success:true};
    }
    case 'searchCases': {
      const q=(data.q||'').toLowerCase();
      return {success:true,data:DEMO.cases.filter(c=>String(c.caseid).toLowerCase().includes(q)||String(c.customername).toLowerCase().includes(q)||String(c.contact).toLowerCase().includes(q))};
    }
    case 'getMarket': {
      let r=[...DEMO.market].filter(x=>x.PoolStatus!=='ปิด');
      if(data.sales) r=r.filter(x=>!x.ExpiredSales||!x.ExpiredSales.split(',').includes(data.sales));
      return {success:true,data:r};
    }
    case 'sendToMarket': {
      const c=DEMO.cases.find(x=>String(x.caseid)===String(data.caseId));
      const ex=DEMO.market.find(x=>String(x.ID)===String(data.caseId));
      if(!ex&&c) DEMO.market.push({ID:data.caseId,name:c.customername,contact_by:'',contact:c.contact,report:c.report,status:c.status,old_sales:data.sales,ExpiredSales:data.sales,PoolStatus:'เปิด'});
      else if(ex) ex.PoolStatus='เปิด';
      return {success:true};
    }
    case 'closeMarketCase': {
      const mk=DEMO.market.find(x=>String(x.ID)===String(data.caseId));
      if(mk) mk.PoolStatus='ปิด';
      return {success:true};
    }
    case 'claimCase': {
      const mk=DEMO.market.find(x=>String(x.ID)===String(data.caseId));
      if(!mk||mk.PoolStatus!=='เปิด') return {success:false,error:'เคสถูกรับไปแล้ว'};
      mk.PoolStatus='ปิด';
      DEMO.claimedcases.push({caseID:data.caseId,customername:mk.name,contact:mk.contact,report:mk.report,status:mk.status,fromsales:mk.old_sales,sale:data.sales,date:new Date().toLocaleString('th-TH'),newstatus:mk.status,AssignedAt:new Date().toLocaleString('th-TH'),Notes:''});
      return {success:true};
    }
    case 'getClaimedCases': return {success:true,data:data.sales?DEMO.claimedcases.filter(c=>c.sale===data.sales):DEMO.claimedcases};
    case 'updateClaimed': {
      const idx=DEMO.claimedcases.findIndex(c=>String(c.caseID)===String(data.caseId));
      if(idx>=0) Object.assign(DEMO.claimedcases[idx],{newstatus:data.newstatus,Notes:data.Notes});
      return {success:true};
    }
    case 'returnCase': {
      const idx=DEMO.claimedcases.findIndex(c=>String(c.caseID)===String(data.caseId)&&c.sale===data.sales);
      if(idx>=0) DEMO.claimedcases.splice(idx,1);
      const mk=DEMO.market.find(x=>String(x.ID)===String(data.caseId));
      if(mk){const exp=(mk.ExpiredSales||'').split(',').filter(Boolean);if(!exp.includes(data.sales))exp.push(data.sales);mk.ExpiredSales=exp.join(',');mk.PoolStatus='เปิด';}
      return {success:true};
    }
    case 'getBookings': return {success:true,data:data.sales?DEMO.bookings.filter(b=>b['เซลส์']===data.sales):DEMO.bookings};
    case 'addBooking': DEMO.bookings.push({'วันที่':new Date().toLocaleString('th-TH'),CaseID:data.caseId,'เซลส์':data.sales,'ลูกค้า':data.customer,Facebook:data.facebook||'',Ads:data.ads||'','รถ':data.brand||'','รุ่น':data.model||'','ทะเบียน':data.plate||'','สถานะ':data.status||'จองแล้ว','หมายเหตุ':data.note||''}); return {success:true};
    case 'updateBooking': {
      const idx=DEMO.bookings.findIndex(b=>String(b.CaseID)===String(data.caseId));
      if(idx>=0) Object.assign(DEMO.bookings[idx],{'สถานะ':data.status,'หมายเหตุ':data.note});
      return {success:true};
    }
    case 'getDashboard': {
      const d2=new Date(),pre=String(d2.getFullYear()).slice(-2)+String(d2.getMonth()+1).padStart(2,'0');
      const sales=DEMO.users.filter(u=>u.role==='Sales');
      if(data.role==='Admin'){
        return {success:true,data:{sales:sales.map(u=>{const my=DEMO.cases.filter(c=>c.sales===u.name&&String(c.caseid).startsWith(pre));return {name:u.name,avatar:u.avatar,currentCases:my.length,claimedCases:DEMO.claimedcases.filter(c=>c.sale===u.name).length,sold:my.filter(c=>c.status==='ปล่อยแล้ว').length,statuses:{}};}),total:{cases:DEMO.cases.filter(c=>String(c.caseid).startsWith(pre)).length}}};
      }
      const my=DEMO.cases.filter(c=>c.sales===data.sales&&String(c.caseid).startsWith(pre));
      return {success:true,data:{currentCases:my.length,claimedCases:DEMO.claimedcases.filter(c=>c.sale===data.sales).length,sold:my.filter(c=>c.status==='ปล่อยแล้ว').length,statuses:{}}};
    }
    case 'getHistory': return {success:true,data:data.caseId?DEMO.history.filter(h=>String(h['รหัสเคส'])===String(data.caseId)):DEMO.history};
    case 'getNotifications': return {success:true,data:data.sales?DEMO.notifications.filter(n=>n['เซลส์']===data.sales):DEMO.notifications};
    case 'markNotifRead': {const idx=DEMO.notifications.findIndex(n=>n.notifId===data.notifId);if(idx>=0)DEMO.notifications[idx]['สถานะ']='read';return {success:true};}
    case 'deleteCase': {
      const idx=DEMO.cases.findIndex(c=>String(c.caseid)===String(data.caseId));
      if(idx>=0) DEMO.cases.splice(idx,1);
      const mi=DEMO.market.findIndex(m=>String(m.ID)===String(data.caseId));
      if(mi>=0) DEMO.market.splice(mi,1);
      return {success:true};
    }
    case 'adminPullCase': case 'adminChangeSales': {const idx=DEMO.cases.findIndex(c=>String(c.caseid)===String(data.caseId));if(idx>=0)DEMO.cases[idx].sales=data.newSales;return {success:true};}
    default: return {success:true,data:[]};
  }
}

  function getActionStyle(action){
    const a=String(action||'').trim();
    if(a.includes('เพิ่มเคส'))    return {icon:'✨',bg:'rgba(63,185,80,.15)',  border:'rgba(63,185,80,.4)',  color:'var(--green)'};
    if(a.includes('แก้ไข'))       return {icon:'✏️',bg:'rgba(88,166,255,.12)', border:'rgba(88,166,255,.35)',color:'var(--blue)'};
    if(a.includes('ส่งตลาด'))     return {icon:'⬆️',bg:'rgba(210,153,34,.15)', border:'rgba(210,153,34,.4)', color:'var(--yellow)'};
    if(a.includes('รับเคส'))      return {icon:'🤝',bg:'rgba(188,140,255,.15)',border:'rgba(188,140,255,.4)',color:'var(--purple)'};
    if(a.includes('คืนเคส'))      return {icon:'↩️',bg:'rgba(255,166,87,.15)', border:'rgba(255,166,87,.4)', color:'var(--orange)'};
    if(a.includes('ปิดเคส'))      return {icon:'🔒',bg:'rgba(248,81,73,.12)',  border:'rgba(248,81,73,.35)', color:'var(--red)'};
    if(a.includes('เปลี่ยนเซลส์')) return {icon:'🔄',bg:'rgba(57,211,83,.12)', border:'rgba(57,211,83,.35)', color:'var(--cyan)'};
    if(a.includes('ดึงเคส'))      return {icon:'📌',bg:'rgba(255,166,87,.15)', border:'rgba(255,166,87,.4)', color:'var(--orange)'};
    if(a.includes('จอง'))         return {icon:'📋',bg:'rgba(88,166,255,.12)', border:'rgba(88,166,255,.35)',color:'var(--blue)'};
    return                               {icon:'📝',bg:'rgba(139,148,158,.12)',border:'rgba(139,148,158,.3)',color:'var(--text2)'};
  }

  function formatDate(d){
    const s=String(d||'');
    if(s.includes('T')){
      const dt=new Date(s);
      if(!isNaN(dt)){
        const dd=String(dt.getDate()).padStart(2,'0');
        const mm=String(dt.getMonth()+1).padStart(2,'0');
        const yy=String(dt.getFullYear()).slice(-2);
        const hh=String(dt.getHours()).padStart(2,'0');
        const min=String(dt.getMinutes()).padStart(2,'0');
        return [`${dd}/${mm}/${yy}`,`${hh}:${min}`];
      }
    }
    const m=s.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);
    if(m) return [`${m[1]}/${m[2]}/${String(m[3]).slice(-2)}`,`${m[4]}:${m[5]}`];
    return [s,''];
  }

  // จัดกลุ่มตามวัน
  const grouped = rows.reduce((acc,h)=>{
    const [date]=formatDate(h['วันที่']);
    if(!acc[date]) acc[date]=[];
    acc[date].push(h);
    return acc;
  },{});

  return <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="modal" style={{maxWidth:500,borderRadius:14}}>
      <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:4,height:22,background:'var(--purple)',borderRadius:2,flexShrink:0}}/>
        <span style={{fontWeight:700,fontSize:15}}>Timeline เคส {caseId}</span>
        <button className="btn btn-ghost" style={{padding:'4px 8px',marginLeft:'auto'}} onClick={onClose}><Ico.x/></button>
      </div>

      <div style={{padding:'16px 20px',maxHeight:'75vh',overflowY:'auto'}}>
        {loading?<div style={{padding:40,textAlign:'center'}}>
          <SkeletonCards n={3}/>
        </div>:rows.length===0?
        <div style={{textAlign:'center',padding:'40px 0',color:'var(--text2)'}}>
          <div style={{fontSize:36,marginBottom:8}}>📭</div>
          <div>ยังไม่มีประวัติ</div>
        </div>:

        Object.entries(grouped).map(([date,items],gi)=><div key={gi} style={{marginBottom:20}}>
          {/* วันที่ header */}
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',background:'var(--bg3)',border:'1px solid var(--border)',padding:'3px 10px',borderRadius:20,whiteSpace:'nowrap'}}>
              📅 {date}
            </div>
            <div style={{flex:1,height:1,background:'var(--border)'}}/>
          </div>

          {/* timeline items */}
          <div style={{position:'relative',paddingLeft:44}}>
            {/* vertical line */}
            {items.length>1&&<div style={{position:'absolute',left:17,top:20,bottom:20,width:2,background:'var(--border)',borderRadius:1}}/>}

            {items.map((h,i)=>{
              const st=getActionStyle(h.action);
              const [,time]=formatDate(h['วันที่']);
              return <div key={i} style={{position:'relative',marginBottom:i<items.length-1?16:0}}>
                {/* dot */}
                <div style={{
                  position:'absolute',left:-44,
                  width:34,height:34,borderRadius:'50%',
                  background:st.bg,border:`2px solid ${st.border}`,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:14,flexShrink:0,
                  boxShadow:`0 0 0 3px var(--bg2)`
                }}>
                  {st.icon}
                </div>

                {/* content card */}
                <div style={{
                  background:'var(--bg3)',border:`1px solid var(--border)`,
                  borderLeft:`3px solid ${st.border}`,
                  borderRadius:8,padding:'10px 14px',
                  transition:'border-color .15s'
                }}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:4}}>
                    <div style={{fontSize:13,fontWeight:700,color:st.color}}>{h.action}</div>
                    <div style={{fontSize:11,color:'var(--text3)',whiteSpace:'nowrap',flexShrink:0}}>{time}</div>
                  </div>
                  {h.detail&&<div style={{fontSize:12,color:'var(--text2)',marginBottom:4,lineHeight:1.5}}>{h.detail}</div>}
                  <div style={{fontSize:11,color:'var(--text3)',display:'flex',alignItems:'center',gap:4}}>
                    <span style={{background:'rgba(88,166,255,.1)',color:'var(--blue)',padding:'1px 7px',borderRadius:20,fontWeight:600}}>
                      {h['เซลส์']||'ระบบ'}
                    </span>
                  </div>
                </div>
              </div>;
            })}
          </div>
        </div>)}
      </div>
    </div>
  </div>;
}


// ============================================================
// CASE MODAL — redesigned (Admin + Sales shared)
// ============================================================
function CaseModal({caseData,users,currentUser,onClose,onUpdated}){
  const [status,setStatus]=useState(caseData.status||caseData.newstatus||'รอข้อมูล');
  const [report,setReport]=useState(caseData.report||'');
  const [editReport,setEditReport]=useState(false);
  const [loading,setLoading]=useState(false);
  const [showHistory,setShowHistory]=useState(false);
  const [newSales,setNewSales]=useState(caseData.sales||caseData.sale||'');
  const [notes,setNotes]=useState([]);
  const [addingNote,setAddingNote]=useState(false);
  const [newNote,setNewNote]=useState('');
  const [confirmDel,setConfirmDel]=useState(false);
  const isAdmin=currentUser.role==='Admin';
  const isClaimed=!!caseData.fromsales;
  const caseId=caseData.caseid||caseData.caseID;
  const contactRaw=caseData.contact||'';
  const contactVal=formatContact(contactRaw);
  const isQR=contactRaw.startsWith('http')||contactRaw.startsWith('data:image');

  // โหลด notes จาก localStorage (เก็บต่อเคส)
  useEffect(()=>{
    try{const d=JSON.parse(localStorage.getItem('cnotes_'+caseId)||'[]');setNotes(Array.isArray(d)?d:[]);}
    catch(e){setNotes([]);}
  },[caseId]);

  function saveNote(){
    if(!newNote.trim())return;
    const upd=[...notes,{text:newNote.trim(),date:new Date().toLocaleString('th-TH'),by:currentUser.name}];
    setNotes(upd);
    try{localStorage.setItem('cnotes_'+caseId,JSON.stringify(upd));}catch(e){}
    setNewNote('');setAddingNote(false);
  }

  function deleteNote(i){
    const upd=notes.filter((_,idx)=>idx!==i);
    setNotes(upd);
    try{localStorage.setItem('cnotes_'+caseId,JSON.stringify(upd));}catch(e){}
  }

  async function save(){
    // Optimistic: ปิด modal ทันที ไม่รอ API
    const optimisticData = isClaimed
      ? {...caseData, newstatus:status}
      : {...caseData, status, report: editReport?report:caseData.report, sales: (isAdmin&&newSales)?newSales:caseData.sales};
    onUpdated(optimisticData); // ส่ง optimistic data ให้ parent update list ทันที
    onClose();
    // sync API ข้างหลัง (silent)
    try{
      if(isClaimed){
        await api('updateClaimed',{caseId,newstatus:status,Notes:'',sales:currentUser.name});
      } else {
        const upd={caseid:caseId,status,changedBy:currentUser.name,detail:'เปลี่ยนสถานะเป็น '+status};
        if(editReport) upd.report=report;
        await api('updateCase',upd);
        if(isAdmin&&newSales&&newSales!==caseData.sales){
          await api('adminChangeSales',{caseId,newSales});
        }
      }
    }catch(e){/* silent */}
  }

  async function saveReport(){
    if(!report.trim())return;
    setEditReport(false);
    onUpdated({...caseData, report}); // optimistic
    onClose();
    try{await api('updateCase',{caseid:caseId,report,changedBy:currentUser.name,detail:'แก้ไขรีพอร์ต'});}catch(e){}
  }

  async function doDelete(){
    onClose();
    const r = await api('deleteCase',{caseId, caseid:caseId, deletedBy:currentUser.name});
    cacheClear(['getCases','getMarket','getDashboard','getClaimedCases','getHistory','getNotifications']);
    if(r.success){
      onUpdated();
    } else {
      alert('เกิดข้อผิดพลาด: ' + (r.error || 'ไม่สามารถลบได้'));
    }
  }

  if(showHistory) return <HistoryModal caseId={caseId} onClose={()=>setShowHistory(false)}/>;

  return <>
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{maxWidth:480,borderRadius:14}}>

        {/* Header */}
        <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:4,height:22,background:'var(--blue)',borderRadius:2,flexShrink:0}}/>
          <span style={{fontWeight:700,fontSize:15}}>ข้อมูลลูกค้า</span>
          <button className="btn btn-ghost" style={{padding:'4px 8px',marginLeft:'auto'}} onClick={onClose}><Ico.x/></button>
        </div>

        {/* Body */}
        <div style={{padding:'16px 20px',overflowY:'auto',maxHeight:'calc(90vh - 190px)'}}>

          {/* Static info */}
          <div style={{marginBottom:14,display:'grid',gap:9}}>
            <div style={{fontSize:14}}><span style={{color:'var(--text2)'}}>รหัสเคส: </span><span style={{fontWeight:700,color:'var(--blue)'}}>{caseId}</span></div>
            <div style={{fontSize:14,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span style={{color:'var(--text2)'}}>ชื่อลูกค้า: </span>
                <span style={{fontWeight:600}}>{caseData.customername||caseData.name||'-'}</span>
                {(caseData.customername||caseData.name)&&
                  <button className="btn btn-primary" style={{padding:'3px 14px',fontSize:12,borderRadius:20}}
                    onClick={()=>copyText(caseData.customername||caseData.name||'')}>
                    Copy
                  </button>
                }
              </div>
            <div style={{fontSize:14,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <span style={{color:'var(--text2)'}}>ติดต่อ: </span>
              {isQR
                ? <div style={{marginTop:6,width:'100%'}}>
                    <img src={contactRaw} alt="QR Code" style={{maxWidth:'100%',maxHeight:220,borderRadius:8,border:'1px solid var(--border)',background:'var(--bg3)',display:'block'}}
                      onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='block';}}
                    />
                    <div style={{display:'none',background:'var(--bg3)',padding:10,borderRadius:8,textAlign:'center',color:'var(--text2)',fontSize:12}}>⚠️ โหลดรูปไม่ได้</div>
                  </div>
                : <>
                    <span style={{fontWeight:600}}>{contactVal||'-'}</span>
                    {contactVal&&<button className="btn btn-primary" style={{padding:'3px 14px',fontSize:12,borderRadius:20}} onClick={()=>copyText(contactVal)}>Copy</button>}
                    {contactVal&&/^\d{9,10}$/.test(contactVal.replace(/\D/g,''))&&<a href={`tel:${contactVal}`} className="contact-action-btn" style={{background:'rgba(63,185,80,.15)',color:'var(--green)',textDecoration:'none'}}><Ico.phone/>โทร</a>}
                    {contactVal&&/^\d{9,10}$/.test(contactVal.replace(/\D/g,''))&&<a href={`https://line.me/ti/p/~${contactVal}`} target="_blank" rel="noopener" className="contact-action-btn" style={{background:'rgba(0,200,83,.15)',color:'#06c755',textDecoration:'none'}}>💬 Line</a>}
                  </>
              }
            </div>
          </div>

          {/* Status */}
          <div className="form-group">
            <label>สถานะ:</label>
            <select value={status} onChange={e=>setStatus(e.target.value)}>
              {STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>

          {/* Sales */}
          <div className="form-group">
            <label>เซลส์:</label>
            {isAdmin&&!isClaimed
              ? <select value={newSales} onChange={e=>setNewSales(e.target.value)}>
                  <option value="">-- เลือกเซลส์ --</option>
                  {(users||[]).filter(u=>u.role==='Sales').map(u=><option key={u.userId} value={u.name}>{u.name}</option>)}
                </select>
              : <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 12px',fontSize:14}}>{caseData.sales||caseData.sale||currentUser.name}</div>
            }
          </div>

          {/* Report */}
          <div className="form-group">
            <label>รีพอร์ต:</label>
            {editReport
              ? <textarea rows={4} value={report} onChange={e=>setReport(e.target.value)} style={{color:'var(--text)'}}/>
              : <div style={{background:'var(--bg3)',padding:'8px 12px',borderRadius:6,fontSize:13,minHeight:56,whiteSpace:'pre-wrap',color:'var(--text2)',lineHeight:1.6}}>{report||'ไม่มีรีพอร์ต'}</div>
            }
          </div>

          {/* Notes */}
          <div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <span style={{fontSize:14,fontWeight:600}}>📝 Notes</span>
              <button className="btn btn-ghost" style={{fontSize:12,padding:'3px 12px',borderRadius:20,border:'1px dashed var(--border)'}} onClick={()=>setAddingNote(!addingNote)}>
                + เพิ่ม Note
              </button>
            </div>
            {addingNote&&<div style={{marginBottom:10}}>
              <textarea rows={2} value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="เขียน note ที่นี่..." style={{marginBottom:6}}/>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-primary" style={{fontSize:12,padding:'5px 14px'}} onClick={saveNote}>บันทึก</button>
                <button className="btn btn-ghost" style={{fontSize:12,padding:'5px 14px'}} onClick={()=>{setAddingNote(false);setNewNote('');}}>ยกเลิก</button>
              </div>
            </div>}
            {notes.length===0&&!addingNote
              ? <div style={{textAlign:'center',color:'var(--text3)',fontSize:12,padding:'8px 0'}}>ยังไม่มี notes</div>
              : <div style={{maxHeight:150,overflowY:'auto'}}>
                  {notes.map((n,i)=><div key={i} style={{background:'var(--bg3)',borderRadius:6,padding:'8px 10px',marginBottom:6,fontSize:13,display:'flex',gap:8,alignItems:'flex-start'}}>
                    <div style={{flex:1}}>
                      <div style={{color:'var(--text)'}}>{n.text}</div>
                      <div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>โดย {n.by} · {n.date}</div>
                    </div>
                    <button onClick={()=>deleteNote(i)} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14,padding:'0 2px',flexShrink:0}}>✕</button>
                  </div>)}
                </div>
            }
          </div>

          {/* 📎 รูปภาพแนบ */}
          <div style={{marginTop:14}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <span style={{fontSize:14,fontWeight:600}}>📎 รูปภาพแนบ</span>
              <span style={{fontSize:11,color:'var(--text3)'}}>อัปโหลดไป Google Drive</span>
            </div>
            <ImageUploader
              value={caseData.attachment||''}
              onChange={async(url)=>{
                if(url&&API_URL){
                  // บันทึก URL ลง Sheet ใน field attachment
                  await api('updateCase',{caseid:caseId,attachment:url,changedBy:currentUser.name,detail:'เพิ่มรูปภาพแนบ'});
                }
              }}
              caseId={caseId}
              label="🖼️"
              maxMB={10}
            />
          </div>
        </div>

        {/* Footer */}
        <div style={{padding:'10px 16px',borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex',gap:8,marginBottom:8,flexWrap:'wrap'}}>
            {!isClaimed&&<button className="btn btn-primary" style={{flex:1,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',gap:5}} onClick={editReport?saveReport:()=>setEditReport(true)}>
              ✏️ {editReport?'บันทึกรีพอร์ต':'แก้ไขรีพอร์ต'}
            </button>}
            <button className="btn btn-ghost" style={{flex:1,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',gap:5}} onClick={()=>setShowHistory(true)}>
              <Ico.history/> ประวัติ
            </button>
            {!isClaimed&&<button className="btn btn-ghost" style={{flex:1,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',gap:5}} onClick={()=>setConfirmDel(true)}>
              🗑 ลบ
            </button>}
          </div>
          <button style={{width:'100%',background:'#e53935',color:'#fff',border:'none',borderRadius:8,padding:'11px',fontSize:14,fontWeight:700,cursor:'pointer',transition:'opacity .15s'}} onClick={save}>
            บันทึก &amp; ปิด
          </button>
        </div>
      </div>
    </div>
    {confirmDel&&<Confirm msg={'ลบเคส '+caseId+' ออกจากระบบ? (ไม่สามารถกู้คืนได้)'} onOk={()=>{setConfirmDel(false);doDelete();}} onCancel={()=>setConfirmDel(false)}/>}
  </>;
}

// ============================================================
// IMAGE UPLOADER (ใช้ได้ทั้ง QR และแนบรูปทั่วไป)
// ============================================================
function ImageUploader({value, onChange, caseId='', label='📷', accept='image/*', maxMB=10}){
  const [status,setStatus]=useState(''); // ''|'compressing'|'uploading'|'done'|'cloud'|'error'
  const [preview,setPreview]=useState(()=>value||'');
  const fileRef=useRef();

  const prevRef=useRef(value);
  useEffect(()=>{
    if(!value && prevRef.current){ setPreview(''); setStatus(''); }
    prevRef.current=value;
  },[value]);

  function compressImage(file){
    return new Promise(resolve=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        const img=new Image();
        img.onload=()=>{
          const MAX=800;
          let w=img.width,h=img.height;
          if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
          const canvas=document.createElement('canvas');
          canvas.width=w;canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          resolve(canvas.toDataURL('image/jpeg',0.80));
        };
        img.onerror=()=>resolve(ev.target.result);
        img.src=ev.target.result;
      };
      reader.onerror=()=>resolve('');
      reader.readAsDataURL(file);
    });
  }

  async function handleFile(e){
    const file=e.target.files[0];
    if(!file) return;
    if(!file.type.startsWith('image/')) return alert('กรุณาเลือกไฟล์รูปภาพ');
    if(file.size>maxMB*1024*1024) return alert(`ไฟล์ต้องไม่เกิน ${maxMB}MB`);

    setStatus('compressing');
    const compressed=await compressImage(file);
    if(!compressed){setStatus('error');return;}

    // แสดงรูปทันที (base64)
    setPreview(compressed);
    onChange(compressed);
    setStatus('done');

    // Upload Drive ข้างหลัง
    if(API_URL){
      setStatus('uploading');
      try{
        const r=await api('uploadImage',{
          base64:compressed,
          mimeType:'image/jpeg',
          filename:(file.name||'img_'+Date.now()+'.jpg'),
          caseId:caseId||'',
          type:'attachment'
        });
        if(r?.success&&r.url){
          onChange(r.url);
          setPreview(r.thumbUrl||r.url);
          setStatus('cloud');
        } else { setStatus('done'); }
      }catch(e){ setStatus('done'); }
    }
  }

  function handlePaste(e){
    const items=e.clipboardData?.items||[];
    for(const item of items){
      if(item.type.startsWith('image/')){
        handleFile({target:{files:[item.getAsFile()]}});
      }
    }
  }

  function clear(e){
    e.stopPropagation();e.preventDefault();
    setPreview('');onChange('');setStatus('');
    if(fileRef.current) fileRef.current.value='';
  }

  const statusBadge={
    compressing:<span style={badgeStyle('#1f6feb')}>⚙️ กำลังบีบอัด...</span>,
    uploading:  <span style={badgeStyle('#1f6feb')}><span className="spin" style={{width:10,height:10,borderWidth:2,display:'inline-block',marginRight:4}}/> อัปโหลด Drive...</span>,
    done:       <span style={badgeStyle('#238636')}>✅ บันทึกแล้ว</span>,
    cloud:      <span style={badgeStyle('#1f6feb')}>☁️ Drive</span>,
    error:      <span style={badgeStyle('#da3633')}>❌ ผิดพลาด</span>,
  };
  function badgeStyle(bg){return {position:'absolute',bottom:6,left:6,background:bg+'cc',color:'#fff',fontSize:10,padding:'2px 7px',borderRadius:20,pointerEvents:'none'};}

  return <div onPaste={handlePaste}>
    <input ref={fileRef} type="file" accept={accept} style={{display:'none'}} onChange={handleFile}/>
    {preview
      ? <div style={{position:'relative',display:'inline-block',width:'100%'}}>
          <img src={preview} alt="รูปภาพ"
            style={{width:'100%',maxHeight:220,objectFit:'contain',borderRadius:8,
              border:'1px solid var(--border)',background:'var(--bg3)',display:'block'}}
            onError={e=>{e.target.style.opacity='0.3';}}
          />
          {statusBadge[status]}

function AddCaseModal({users,currentUser,onClose,onAdded}){
  const [form,setForm]=useState({customername:'',contact:'',contact_by:'ไลน์',report:'',status:'รอข้อมูล',sales:currentUser.role==='Admin'?'':currentUser.name,sent:'ปกติ'});
  const [loading,setLoading]=useState(false);
  const [previewId,setPreviewId]=useState('');
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  useEffect(()=>{
    // Generate preview case ID
    const d=new Date();
    const yy=String(d.getFullYear()).slice(-2);
    const mm=String(d.getMonth()+1).padStart(2,'0');
    const pre=yy+mm;
    api('getCases',{all:'true'}).then(r=>{
      if(r.success){
        const max=(r.data||[]).filter(c=>String(c.caseid).startsWith(pre)).reduce((m,c)=>{const n=parseInt(String(c.caseid).slice(4))||0;return n>m?n:m;},0);
        setPreviewId(pre+String(max+1).padStart(3,'0'));
      } else {
        setPreviewId(pre+'???');
      }
    });
  },[]);

  async function submit(){
    if(!form.customername||!form.sales) return alert('กรุณากรอกชื่อลูกค้าและเลือกเซลส์');
    setLoading(true);
    const r=await api('addCase',{...form});
    setLoading(false);
    if(r.success){
      // trigger push notification ทันทีให้เซลส์ที่ได้รับเคส
      try{window.cpTriggerPushPoll&&window.cpTriggerPushPoll(2000);}catch(e){}
      onAdded();onClose();
    }
    else alert(r.error||'เกิดข้อผิดพลาด');
  }
  return <Modal title="➕ เพิ่มข้อมูลลูกค้า" onClose={onClose} footer={<>
    <button className="btn btn-ghost" onClick={onClose}>ยกเลิก</button>

        <label>รหัสเคส (สร้างอัตโนมัติ)</label>
        <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 12px',fontSize:15,fontWeight:700,color:'var(--blue)',letterSpacing:1}}>
          {previewId||'กำลังสร้าง...'}
        </div>
      </div>
      <div className="form-group" style={{gridColumn:'1/-1'}}><label>ชื่อลูกค้า *</label><input value={form.customername} onChange={e=>set('customername',e.target.value)} placeholder="ชื่อ-นามสกุล"/></div>
      <div className="form-group"><label>ติดต่อโดย</label><select value={form.contact_by} onChange={e=>set('contact_by',e.target.value)}>{CONTACT_BY.map(c=><option key={c}>{c}</option>)}</select></div>
      <div className="form-group">
        <label>ข้อมูลติดต่อ</label>
        {form.contact_by==='QR Code'?
          <QrUploader value={form.contact} onChange={v=>set('contact',v)}/>:
          <input value={form.contact} onChange={e=>set('contact',e.target.value)} placeholder="เบอร์ / ไลน์ / ID"/>
        }
      </div>
      <div className="form-group"><label>สถานะ</label><select value={form.status} onChange={e=>set('status',e.target.value)}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
      <div className="form-group"><label>ส่ง</label><select value={form.sent} onChange={e=>set('sent',e.target.value)}>{SENT_TYPES.map(s=><option key={s}>{s}</option>)}</select></div>
      {currentUser.role==='Admin'&&<div className="form-group" style={{gridColumn:'1/-1'}}><label>เซลส์ *</label><select value={form.sales} onChange={e=>set('sales',e.target.value)}><option value="">-- เลือกเซลส์ --</option>{users.filter(u=>u.role==='Sales').map(u=><option key={u.userId} value={u.name}>{u.name}</option>)}</select></div>}

    </div>
  </Modal>;
}

// NOTIFICATION PANEL
// ============================================================
function NotifPanel({user,onClose,onCountChange}){
  const [notifs,setNotifs]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{api('getNotifications',{sales:user.name}).then(r=>{if(r.success)setNotifs(r.data||[]);setLoading(false);});},[]);
  async function markRead(id){
    await api('markNotifRead',{notifId:id});
    const updated=notifs.map(x=>x.notifId===id?{...x,'สถานะ':'read'}:x);
    setNotifs(updated);
    if(onCountChange)onCountChange(updated.filter(n=>n['สถานะ']==='unread').length);
  }
  async function markAllRead(){
    const unread=notifs.filter(n=>n['สถานะ']==='unread');
    for(const n of unread) await api('markNotifRead',{notifId:n.notifId});
    setNotifs(prev=>prev.map(x=>({...x,'สถานะ':'read'})));
    if(onCountChange)onCountChange(0);
  }
  return <div style={{position:'fixed',top:56,right:16,width:320,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,boxShadow:'var(--shadow)',zIndex:200,maxHeight:420,overflowY:'auto'}}>
    <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{fontWeight:700}}>การแจ้งเตือน</span>
      <div style={{display:'flex',gap:6}}>
        <button className="btn btn-ghost" style={{padding:'2px 8px',fontSize:11}} onClick={markAllRead}>อ่านทั้งหมด</button>
        <button className="btn btn-ghost" style={{padding:'2px 8px'}} onClick={onClose}><Ico.x/></button>
      </div>
    </div>
    {loading?<Loading/>:notifs.length===0?<p style={{padding:20,textAlign:'center',color:'var(--text2)',fontSize:13}}>ไม่มีการแจ้งเตือน</p>:
    notifs.slice(0,30).map(n=><div key={n.notifId} style={{padding:'10px 16px',borderBottom:'1px solid var(--border)',background:n['สถานะ']==='unread'?'rgba(88,166,255,.06)':'transparent',cursor:'pointer'}} onClick={()=>markRead(n.notifId)}>
      <div style={{fontSize:13,display:'flex',gap:8,alignItems:'flex-start'}}>
        {n['สถานะ']==='unread'&&<span style={{width:7,height:7,borderRadius:'50%',background:'var(--blue)',flexShrink:0,marginTop:4}}/>}
        <span style={{color:n['สถานะ']==='unread'?'var(--text)':'var(--text2)'}}>{n.message}</span>
      </div>
      <div style={{fontSize:11,color:'var(--text3)',marginTop:3,paddingLeft:n['สถานะ']==='unread'?15:0}}>{String(n['วันที่']||'')}</div>
    </div>)}
  </div>;
}

// ============================================================
// ADMIN — CURRENT CASES
// ============================================================
function AdminCurrentCases({currentUser,users}){
  const [cases,setCases]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState({sales:'all',status:'',q:''});
  const [sortDir,setSortDir]=useState('desc'); // desc=ใหม่สุดก่อน, asc=เก่าสุดก่อน
  const [sel,setSel]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [showAddBook,setShowAddBook]=useState(false);

  const load=useCallback(()=>{
    setLoading(true);
    api('getCases',{}).then(r=>{if(r.success)setCases(r.data||[]);setLoading(false);});
  },[]);
  useEffect(()=>{load();},[load]);

  async function search(){
    if(!filter.q){load();return;}
    setLoading(true);
    const r=await api('searchCases',{q:filter.q});
    if(r.success)setCases(r.data||[]);
    setLoading(false);
  }

  const filtered=cases.filter(c=>{
    if(filter.sales!=='all'&&c.sales!==filter.sales)return false;
    if(filter.status&&c.status!==filter.status)return false;
    return true;
  }).sort((a,b)=>{
    const av=String(a.caseid||''), bv=String(b.caseid||'');
    return sortDir==='desc'?bv.localeCompare(av):av.localeCompare(bv);
  });

  const salesList=users.filter(u=>u.role==='Sales');

  return <div className="page">
    <div className="page-hd">
      <div><div className="page-title">📋 เคสปัจจุบัน</div><div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>เดือนนี้ทั้งหมด {filtered.length} เคส</div></div>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-ghost" onClick={()=>setShowAddBook(true)}>📋 เพิ่มจอง</button>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}><Ico.plus/> เพิ่มลูกค้า</button>
      </div>
    </div>
    <div className="search-bar" style={{marginBottom:16}}>
      <div style={{position:'relative',flex:1,maxWidth:280}}>
        <input value={filter.q} onChange={e=>setFilter(f=>({...f,q:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&search()} placeholder="🔍 ค้นหาชื่อ เบอร์ รหัสเคส"/>
      </div>
      <button className="btn btn-ghost" onClick={search}><Ico.search/> ค้นหา</button>
      <select value={filter.sales} onChange={e=>setFilter(f=>({...f,sales:e.target.value}))} style={{minWidth:100}}>
        <option value="all">ทุกเซลส์</option>
        {salesList.map(u=><option key={u.userId} value={u.name}>{u.name}</option>)}
      </select>
      <select value={filter.status} onChange={e=>setFilter(f=>({...f,status:e.target.value}))} style={{minWidth:120}}>
        <option value="">ทุกสถานะ</option>
        {STATUSES.map(s=><option key={s}>{s}</option>)}
      </select>
      <button className="btn btn-ghost" onClick={load}>🔄</button>
    </div>
    <div className="card" style={{padding:0}}>
      <div className="table-wrap">
        <table>
          <thead><tr>
            <th onClick={()=>setSortDir(d=>d==='desc'?'asc':'desc')} style={{cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}}>
              รหัสเคส {sortDir==='desc'?'↓':'↑'}
            </th>
            <th>ชื่อลูกค้า</th><th>ติดต่อ</th><th>สถานะ</th><th>เซลส์</th><th>อัปเดตล่าสุด</th></tr></thead>
          <tbody>
            {loading?<SkeletonRows n={5} cols={6}/> :
            filtered.length===0?<tr><td colSpan={6} style={{textAlign:'center',padding:30,color:'var(--text2)'}}>ไม่พบเคส</td></tr>:
            filtered.map((c,i)=><tr key={i} className="clickable" onClick={()=>setSel(c)}>
              <td><span style={{color:'var(--blue)',fontWeight:700}}>{c.caseid}</span></td>
              <td style={{fontWeight:500}}>{c.customername}</td>
              <td style={{fontSize:13,color:'var(--text2)'}}>{displayContact(c.contact)}</td>
              <td><StatusBadge status={c.status}/></td>
              <td><span style={{color:'var(--purple)'}}>{c.sales}</span></td>
              <td style={{fontSize:12,color:'var(--text3)'}}>{String(c.updatedat||'').split(' ')[0]}</td>
            </tr>)}
          </tbody>
        </table>
      </div>
    </div>
    {sel&&<CaseModal caseData={sel} users={users} currentUser={currentUser} onClose={()=>setSel(null)} onUpdated={load}/>}
    {showAdd&&<AddCaseModal users={users} currentUser={currentUser} onClose={()=>setShowAdd(false)} onAdded={load}/>}
    {showAddBook&&<AddBookingModal currentUser={currentUser} users={users} onClose={()=>setShowAddBook(false)} onAdded={()=>{}}/>}
  </div>;
}

function csvEscape(v){
  const s=String(v==null?'':v).replace(/"/g,'""');
  return /[,"\n\r]/.test(s)?`"${s}"`:s;
}
function downloadCSV(rows, filename){
  const bom='\uFEFF'; // UTF-8 BOM สำหรับ Excel ภาษาไทย
  const csv=bom+rows.map(r=>r.map(csvEscape).join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function ExportModal({allCases,salesList,onClose}){
  const [type,setType]=useState('cases_month');   // ประเภทรายงาน
  const [salesFilter,setSalesFilter]=useState('all');
  const [statusFilter,setStatusFilter]=useState('all');
  const [exporting,setExporting]=useState(false);
  const [done,setDone]=useState(false);

  const now=new Date();
  const pre=String(now.getFullYear()).slice(-2)+String(now.getMonth()+1).padStart(2,'0');
  const monthLabel=`${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;

  function doExport(){
    setExporting(true);
    setTimeout(()=>{
      try{
        let cases=[...allCases];

        // กรอง
        if(type==='cases_month') cases=cases.filter(c=>String(c.caseid).startsWith(pre));
        if(type==='cases_all')   {} // ทั้งหมด
        if(salesFilter!=='all')  cases=cases.filter(c=>c.sales===salesFilter);
        if(statusFilter!=='all') cases=cases.filter(c=>c.status===statusFilter);

        if(type==='summary_sales'){
          // รายงานสรุปต่อเซลส์
          const rows=[['เซลส์','เคสปัจจุบัน','รับตลาด','ปล่อยแล้ว']];
          salesList.forEach(s=>rows.push([s.name,s.currentCases||0,s.claimedCases||0,s.sold||0]));
          downloadCSV(rows,`สรุปรายเซลส์_${monthLabel.replace('/','_')}.csv`);
        } else if(type==='summary_status'){
          // รายงานสรุปสถานะ
          const map={};
          cases.forEach(c=>{map[c.status]=(map[c.status]||0)+1;});
          const rows=[['สถานะ','จำนวน','%']];
          const total=cases.length||1;
          Object.entries(map).sort((a,b)=>b[1]-a[1]).forEach(([st,cnt])=>{
            rows.push([st,cnt,`${Math.round(cnt/total*100)}%`]);
          });
          rows.push(['รวม',cases.length,'100%']);
          downloadCSV(rows,`สรุปสถานะ_${monthLabel.replace('/','_')}.csv`);
        } else {
          // รายงานเคสทั้งหมด
          const headers=['รหัสเคส','ชื่อลูกค้า','ติดต่อ','สถานะ','เซลส์','รีพอร์ต','วันที่สร้าง','อัปเดตล่าสุด'];
          const rows=[headers,...cases.map(c=>[
            c.caseid||'',
            c.customername||'',
            (c.contact||'').startsWith('data:')?'[QR Image]':formatContact(c.contact)||'',
            c.status||'',
            c.sales||'',
            c.report||'',
            c.createdat||'',
            c.updatedat||''
          ])];
          const label=type==='cases_month'?`เดือน${monthLabel}`:'ทั้งหมด';
          downloadCSV(rows,`รายงานเคส_${label.replace('/','_')}.csv`);
        }
        setDone(true);
      }catch(e){ alert('เกิดข้อผิดพลาด: '+e); }
      setExporting(false);
    },300);
  }

  const TYPES=[
    {k:'cases_month', l:'📋 เคสเดือนนี้',       desc:'เคสทั้งหมดของเดือน'+monthLabel},
    {k:'cases_all',   l:'📦 เคสทั้งหมด',         desc:'ทุกเคสในระบบ (อาจช้าถ้ามีเยอะ)'},
    {k:'summary_sales',l:'👤 สรุปรายเซลส์',      desc:'จำนวนเคส / ปล่อยแล้ว ต่อ Sales'},
    {k:'summary_status',l:'🏷 สรุปสถานะ',         desc:'จำนวนเคสแต่ละสถานะ'},
  ];

  return <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="modal" style={{maxWidth:440}}>
      <div className="modal-hd">
        <span style={{fontWeight:700,fontSize:15}}>📥 Export รายงาน</span>
        <button className="btn btn-ghost" style={{padding:'4px 8px'}} onClick={onClose}><Ico.x/></button>
      </div>
      <div className="modal-bd">
        {done?
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:48,marginBottom:12}}>✅</div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>ดาวน์โหลดสำเร็จ!</div>
            <div style={{fontSize:13,color:'var(--text2)',marginBottom:20}}>ไฟล์ CSV รองรับภาษาไทย เปิดด้วย Excel ได้เลย</div>
            <div style={{display:'flex',gap:8,justifyContent:'center'}}>
              <button className="btn btn-ghost" onClick={()=>setDone(false)}>Export อีกครั้ง</button>
              <button className="btn btn-primary" onClick={onClose}>ปิด</button>
            </div>
          </div>:
          <>
            {/* เลือกประเภท */}
            <div className="form-group">
              <label>ประเภทรายงาน</label>
              <div style={{display:'grid',gap:8}}>
                {TYPES.map(t=><div key={t.k}
                  onClick={()=>setType(t.k)}
                  style={{padding:'10px 14px',borderRadius:8,border:`2px solid ${type===t.k?'var(--blue)':'var(--border)'}`,
                    background:type===t.k?'rgba(88,166,255,.08)':'var(--bg3)',cursor:'pointer',transition:'all .15s'}}>
                  <div style={{fontWeight:600,fontSize:13}}>{t.l}</div>
                  <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{t.desc}</div>
                </div>)}
              </div>
            </div>

            {/* filter เพิ่มเติม (เฉพาะ cases) */}
            {(type==='cases_month'||type==='cases_all')&&<>
              <div className="form-group">
                <label>กรองเซลส์</label>
                <select value={salesFilter} onChange={e=>setSalesFilter(e.target.value)}>
                  <option value="all">ทุกเซลส์</option>
                  {salesList.map(s=><option key={s.name} value={s.name}>{s.name}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>กรองสถานะ</label>
                <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
                  <option value="all">ทุกสถานะ</option>
                  {STATUSES.map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
              <div style={{fontSize:12,color:'var(--text2)',background:'var(--bg3)',padding:'8px 12px',borderRadius:6,marginBottom:4}}>
                📊 พบ <strong style={{color:'var(--blue)'}}>
                  {allCases.filter(c=>{
                    if(type==='cases_month'&&!String(c.caseid).startsWith(pre)) return false;
                    if(salesFilter!=='all'&&c.sales!==salesFilter) return false;
                    if(statusFilter!=='all'&&c.status!==statusFilter) return false;
                    return true;
                  }).length}
                </strong> เคส ที่จะ export
              </div>
            </>}
          </>
        }
      </div>
      {!done&&<div className="modal-ft">
        <button className="btn btn-ghost" onClick={onClose}>ยกเลิก</button>
        <button className="btn btn-green" onClick={doExport} disabled={exporting}
          style={{display:'flex',alignItems:'center',gap:6}}>
          {exporting?<><span className="spin" style={{width:14,height:14,marginRight:0}}/> กำลัง Export...</>:'⬇️ ดาวน์โหลด CSV'}
        </button>
      </div>}
    </div>
  </div>;
}


function useChartJs(cb, deps){
  useEffect(()=>{
    if(window.Chart){ cb(); return; }
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js';
    s.onload=()=>cb();
    document.head.appendChild(s);
  }, deps);
}

function BarChart({id,labels,datasets,horizontal=false}){
  const ref=useRef(); const inst=useRef();
  useChartJs(()=>{
    inst.current?.destroy();
    if(!ref.current) return;
    Chart.defaults.color='#8b949e';
    inst.current=new Chart(ref.current,{
      type:'bar',
      data:{labels,datasets:datasets.map(d=>({...d,borderRadius:5,borderSkipped:false}))},
      options:{
        indexAxis:horizontal?'y':'x',
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:16,font:{size:12}}},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+c.raw}}},
        scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{font:{size:12}}},y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{font:{size:12},stepSize:1,precision:0}}}
      }
    });
  },[labels,datasets]);
  useEffect(()=>()=>inst.current?.destroy(),[]);
  return <canvas ref={ref}/>;
}

function DonutChart({id,labels,values,colors}){
  const ref=useRef(); const inst=useRef();
  useChartJs(()=>{
    inst.current?.destroy();
    if(!ref.current) return;
    inst.current=new Chart(ref.current,{
      type:'doughnut',
      data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:2,borderColor:'var(--bg2)',hoverOffset:6}]},
      options:{
        responsive:true,maintainAspectRatio:false,
        cutout:'65%',
        plugins:{legend:{position:'right',labels:{boxWidth:12,padding:10,font:{size:11}}},tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw} (${Math.round(c.raw/(c.dataset.data.reduce((a,b)=>a+b,0)||1)*100)}%)`}}}
      }
    });
  },[labels,values]);
  useEffect(()=>()=>inst.current?.destroy(),[]);
  return <canvas ref={ref}/>;
}

function BookingDetailModal({booking,onClose,onUpdated}){
  const [status,setStatus]=useState(booking['สถานะ']||'จองแล้ว');
  const [note,setNote]=useState(booking['หมายเหตุ']||'');
  const [loading,setLoading]=useState(false);
  async function save(){
    setLoading(true);
    await api('updateBooking',{caseId:booking.CaseID,status,note});
    setLoading(false);
    onUpdated();onClose();
  }
  return <Modal title={`จอง — ${booking.CaseID}`} onClose={onClose} footer={<>
    <button className="btn btn-ghost" onClick={onClose}>ยกเลิก</button>
    <button className="btn btn-primary" onClick={save} disabled={loading}>{loading?'บันทึก...':'💾 บันทึก'}</button>
  </>}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
      {[['ลูกค้า',booking['ลูกค้า']],['เซลส์',booking['เซลส์']],['ยี่ห้อ',booking['รถ']],['รุ่น',booking['รุ่น']],['ทะเบียน',booking['ทะเบียน']],['Facebook',booking.Facebook]].map(([l,v])=>v?<div key={l}><div style={{fontSize:11,color:'var(--text2)',marginBottom:3}}>{l}</div><div style={{fontWeight:500}}>{v}</div></div>:null)}
    </div>
    <div className="form-group"><label>สถานะ</label><select value={status} onChange={e=>setStatus(e.target.value)}>{BOOK_STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
    <div className="form-group"><label>หมายเหตุ</label><textarea rows={2} value={note} onChange={e=>setNote(e.target.value)}/></div>
  </Modal>;
}

function OnboardingTour({currentUser,onDone}){
  const [step,setStep]=useState(0);
  const steps=[
    {icon:'🎉',title:'ยินดีต้อนรับสู่ CasePool!',desc:'ระบบจัดการเคสลูกค้าที่ช่วยให้คุณทำงานเป็นระบบ ไม่พลาดโอกาสปิดการขาย',tip:null},
    {icon:'📊',title:'วันนี้ฉันต้องทำอะไร',desc:'หน้า "วันนี้" บอกทุกอย่างที่ต้องทำ — เคสด่วน เคสค้างนาน และเคสในตลาดที่รอคุณอยู่',tip:'💡 เช็คหน้านี้ทุกเช้าก่อนเริ่มงาน!'},

    {icon:'🏆',title:'แดชบอร์ด & เป้าหมาย',desc:'ดูผลงาน ตั้งเป้าเดือนนี้ เก็บ Achievement badge และดูกราฟย้อนหลัง 6 เดือน',tip:'🎯 ตั้งเป้าช่วยให้คุณโฟกัสและทำได้มากขึ้น!'},
    {icon:'🔍',title:'ค้นหาทั่วทั้งระบบ',desc:'กดไอคอนแว่นขยายที่มุมบนขวาเพื่อค้นหาเคสข้ามหน้าได้ทันที ทั้งเคสของฉันและเคสที่รับจากตลาด',tip:null},
  ];
  function finish(){try{localStorage.setItem('cp_onboarded_'+currentUser.userId,'1');}catch(e){}onDone();}
